// ─── MODEL ────────────────────────────────────────────
function buildModel(portVal) {
  const wrap = d('content');
  wrap.appendChild(h('div', {cls:'label', style:{marginBottom:'14px'}}, 'WHAT-IF CALCULATOR'));

  const mkNum = (id, label, isPrefix, ph) => {
    const f = h('div', {cls:'field'}, h('label', {}, label));
    const fw = d('field-wrap');
    if (isPrefix) fw.appendChild(h('span', {cls:'prefix-sym'}, '$'));
    fw.appendChild(h('input', {type:'number', id, placeholder:ph||'0.00', cls:isPrefix?'prefix':''}));
    f.appendChild(fw);
    return f;
  };
  const mkTxt = (id, label, ph) => {
    const f = h('div', {cls:'field'}, h('label', {}, label));
    const inp = h('input', {type:'text', id, placeholder:ph||''});
    inp.style.textTransform = 'uppercase';
    inp.oninput = () => { inp.value = inp.value.toUpperCase(); };
    f.appendChild(inp);
    return f;
  };

  wrap.appendChild(d('card', d('card-inner',
    mkTxt('m-ticker', 'TICKER', 'e.g. NVDA'),
    h('div', {cls:'col2'}, mkNum('m-price','ENTRY PRICE',true), mkNum('m-shares','SHARES',false,'0')),
    h('div', {cls:'col2'}, mkNum('m-stop','STOP LOSS',true), mkNum('m-target','TARGET',true)),
    mkNum('m-pv','PORTFOLIO VALUE',true)
  )));

  const results = h('div', {id:'model-results'});
  results.appendChild(d('empty', h('div', {cls:'icon'}, '🧮'), h('div', {cls:'mono', style:{fontSize:'12px'}}, 'Enter price & shares to model')));
  wrap.appendChild(results);

  setTimeout(() => {
    const pvEl = document.getElementById('m-pv');
    if (pvEl && !pvEl.value) pvEl.value = portVal.toFixed(2);
    ['m-price','m-shares','m-stop','m-target','m-pv'].forEach(id => {
      const el = document.getElementById(id);
      if (el) el.oninput = calcModel;
    });
  }, 50);
  return wrap;
}

function calcModel() {
  const g = id => parseFloat(document.getElementById(id)?.value) || 0;
  const p = g('m-price'), sh = g('m-shares'), st = g('m-stop'), tgt = g('m-target'), pv = g('m-pv');
  const cost = p * sh;
  const maxLoss = st && p ? (p - st) * sh : null;
  const maxGain = tgt && p ? (tgt - p) * sh : null;
  const rr = maxLoss && maxGain ? maxGain / maxLoss : null;
  const sizePct = pv ? cost / pv * 100 : 0;
  const lossPct = pv && maxLoss ? maxLoss / pv * 100 : null;
  const res = document.getElementById('model-results');
  if (!res) return;
  res.innerHTML = '';
  if (!cost) { res.appendChild(d('empty', h('div', {cls:'icon'}, '🧮'), h('div', {cls:'mono', style:{fontSize:'12px'}}, 'Enter price & shares to model'))); return; }

  const rc = rr >= 3 ? '#00e5a0' : rr >= 2 ? '#ffc84a' : '#ff4d6d';
  if (rr != null) res.appendChild(h('div', {style:{background:'#181c26', border:'2px solid '+rc+'44', borderRadius:'14px', padding:'16px', marginBottom:'10px', textAlign:'center'}},
    h('div', {cls:'label', style:{marginBottom:'6px'}}, 'RISK / REWARD'),
    h('div', {style:{fontSize:'40px', fontWeight:'800', color:rc}}, '1 : ' + rr.toFixed(2)),
    h('div', {style:{fontSize:'11px', color:'#636b82', marginTop:'4px'}}, rr>=3?'✓ Excellent':rr>=2?'△ Acceptable':'✗ Poor R:R')
  ));

  const g2 = h('div', {cls:'col2', style:{marginBottom:'10px'}});
  const sc2 = (lbl, [val, vc], sub, bc) => h('div', {style:{background:'#181c26', borderRadius:'12px', padding:'14px', border:'1px solid '+bc}},
    h('div', {cls:'label', style:{marginBottom:'4px'}}, lbl),
    h('div', {cls:'mono', style:{fontSize:'16px', color:vc}}, val),
    h('div', {style:{fontSize:'10px', color:'#636b82', marginTop:'2px'}}, sub)
  );
  g2.appendChild(sc2('TOTAL COST',  [fmt(cost), '#e8eaf0'], sizePct.toFixed(1)+'% of portfolio', '#242836'));
  if (maxLoss) g2.appendChild(sc2('MAX LOSS',  ['-'+fmt(maxLoss), '#ff4d6d'], (lossPct?.toFixed(1)||'—')+'% of portfolio', 'rgba(255,77,109,0.27)'));
  if (maxGain) g2.appendChild(sc2('MAX GAIN',  ['+'+fmt(maxGain), '#00e5a0'], '+'+(tgt&&p?((tgt-p)/p*100).toFixed(1):'—')+'% upside', 'rgba(0,229,160,0.27)'));
  g2.appendChild(sc2('POSITION SIZE', [sizePct.toFixed(1)+'%', sizePct>15?'#ffc84a':'#e8eaf0'], sizePct>15?'⚠ Oversized':'Within limit', sizePct>15?'rgba(255,200,74,0.27)':'#242836'));
  res.appendChild(g2);

  const cc = h('div', {style:{background:'#181c26', border:'1px solid #242836', borderRadius:'14px', padding:'14px'}},
    h('div', {cls:'label', style:{marginBottom:'10px'}}, 'FRAMEWORK CHECK')
  );
  [[rr!=null&&rr>=2, 'R:R ≥ 2:1 '+(rr?'(1:'+rr.toFixed(2)+')':'')],
   [sizePct<=15, 'Position ≤ 15% ('+sizePct.toFixed(1)+'%)'],
   [lossPct!=null&&lossPct<=2, 'Max loss ≤ 2% of portfolio ('+(lossPct?.toFixed(1)||'—')+'%)'],
   [st>0&&p>0&&(p-st)/p*100<=8, 'Stop within 8% of entry ('+(p&&st?((p-st)/p*100).toFixed(1):'—')+'%)'],
  ].forEach(([pass, lbl]) => {
    cc.appendChild(d('check-row', h('span', {style:{color:pass?'#00e5a0':'#ff4d6d', fontSize:'12px'}}, pass?'✓':'✗'), h('span', {cls:'mono', style:{fontSize:'12px', color:pass?'#e8eaf0':'#636b82'}}, lbl)));
  });
  res.appendChild(cc);
}

// ─── LOG ──────────────────────────────────────────────
function buildLog() {
  const wrap = d('content');
  if (!S.tradeLog.length) { wrap.appendChild(d('empty', h('div', {cls:'icon'}, '📋'), h('div', {cls:'mono', style:{fontSize:'12px'}}, 'No activity yet'))); return wrap; }
  S.tradeLog.forEach(e => {
    const color = {BUY:'#00e5a0', SELL:'#ff4d6d', STOP:'#ffc84a', DEPOSIT:'#4f8fff', WITHDRAW:'#636b82'}[e.type] || '#636b82';
    wrap.appendChild(d('log-row',
      h('div', {style:{display:'flex', alignItems:'center', gap:'10px'}},
        h('span', {cls:'type-tag', style:{background:color+'22', color}}, e.type),
        h('div', {},
          h('div', {cls:'mono', style:{fontSize:'13px'}}, e.ticker),
          h('div', {style:{fontSize:'10px', color:'#636b82'}}, new Date(e.date).toLocaleDateString('en-US',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'}))
        )
      ),
      h('div', {style:{textAlign:'right'}},
        h('div', {cls:'mono', style:{fontSize:'12px'}}, e.shares !== '—' ? e.shares + ' @ ' : '', fmt(e.price)),
        e.pl != null ? h('div', {style:{fontSize:'10px', color:e.pl>=0?'#00e5a0':'#ff4d6d'}}, (e.pl>=0?'+':'') + fmt(e.pl)) : null
      )
    ));
  });
  return wrap;
}

// ─── HELP ─────────────────────────────────────────────
function buildHelp() {
  const wrap = d('content');
  wrap.appendChild(h('div', {cls:'label', style:{marginBottom:'12px'}}, 'FRAMEWORK GUIDE & GLOSSARY'));
  const search = h('input', {type:'text', cls:'search-box', placeholder:'Search terms, acronyms...'});
  wrap.appendChild(search);
  const container = d('');
  wrap.appendChild(container);

  const renderHelp = q => {
    container.innerHTML = '';
    const lq = (q||'').toLowerCase();
    HELP.forEach(section => {
      const items = section.items.filter(item => !lq || [item.term, item.abbr, item.def, item.example||''].some(s => s.toLowerCase().includes(lq)));
      if (!items.length) return;
      const sec = d('help-section', h('div', {cls:'help-section-title'}, section.section));
      items.forEach(item => {
        sec.appendChild(d('help-item',
          h('div', {cls:'help-term'}, item.term),
          item.abbr ? h('div', {style:{fontSize:'10px', color:'#4f8fff', fontFamily:'monospace', marginBottom:'6px'}}, item.abbr) : null,
          h('div', {cls:'help-def'}, item.def),
          item.example ? h('div', {cls:'help-example'}, item.example) : null
        ));
      });
      container.appendChild(sec);
    });
    if (!container.children.length) container.appendChild(d('empty', h('div', {cls:'icon'}, '🔍'), h('div', {cls:'mono', style:{fontSize:'12px'}}, 'No results')));
  };
  renderHelp('');
  search.oninput = () => renderHelp(search.value);
  return wrap;
}

// ═══════════════════════════════════════════════════════
// MODALS
// ═══════════════════════════════════════════════════════
function buildModal(portVal) {
  const overlay = h('div', {cls:'modal-overlay'});
  overlay.onclick = e => { if (e.target === overlay) { MODAL = null; render(); } };
  const sheet = d('modal-sheet');
  overlay.appendChild(sheet);

  const hdr = title => {
    const close = h('button', {cls:'modal-close'}, '✕');
    close.onclick = () => { MODAL = null; render(); };
    sheet.appendChild(d('modal-header', h('span', {cls:'label'}, title), close));
  };
  const cashRow = (lbl, val, color) => h('div', {style:{background:'#0a0c10', borderRadius:'10px', padding:'12px', marginBottom:'14px', display:'flex', justifyContent:'space-between'}},
    h('span', {cls:'label'}, lbl), h('span', {cls:'mono', style:{color}}, val)
  );
  const mkNum = (id, lbl, isP, ph) => {
    const f = h('div', {cls:'field'}, h('label', {}, lbl));
    const fw = d('field-wrap');
    if (isP) fw.appendChild(h('span', {cls:'prefix-sym'}, '$'));
    fw.appendChild(h('input', {type:'number', id, placeholder:ph||'0.00', cls:isP?'prefix':''}));
    f.appendChild(fw); return f;
  };
  const mkTxt = (id, lbl, ph) => {
    const f = h('div', {cls:'field'}, h('label', {}, lbl));
    const inp = h('input', {type:'text', id, placeholder:ph||''});
    inp.style.textTransform = 'uppercase';
    inp.oninput = () => { inp.value = inp.value.toUpperCase(); };
    f.appendChild(inp); return f;
  };

  if (MODAL === 'pot') {
    hdr('Adjust Pot');
    const modeRow = h('div', {style:{display:'flex', gap:'8px', marginBottom:'16px'}});
    ['add','withdraw'].forEach(m => {
      const on = MDATA.mode === m;
      const b = h('button', {style:{flex:'1', padding:'10px', borderRadius:'10px', border:'1px solid '+(on?'#4f8fff':'#242836'), background:on?'rgba(79,143,255,0.13)':'transparent', color:on?'#4f8fff':'#636b82', fontFamily:'monospace', fontSize:'12px', cursor:'pointer'}}, m==='add'?'＋ Add Funds':'－ Withdraw');
      b.onclick = () => { MDATA.mode = m; render(); };
      modeRow.appendChild(b);
    });
    sheet.appendChild(modeRow);
    sheet.appendChild(cashRow('AVAILABLE CASH', fmt(S.cash), '#00e5a0'));
    sheet.appendChild(mkNum('pot-amt', 'AMOUNT', true));
    const btn = h('button', {cls:'btn btn-full', style:{background:MDATA.mode==='add'?'#00e5a0':'#ff4d6d', color:MDATA.mode==='add'?'#0a0c10':'#fff'}}, MDATA.mode==='add'?'Add to Pot':'Withdraw');
    btn.onclick = () => {
      const n = parseFloat(document.getElementById('pot-amt')?.value) || 0;
      if (n > 0) { const sign = MDATA.mode==='add'?1:-1; S.cash = Math.max(0, S.cash+sign*n); S.pot = Math.max(0, S.pot+sign*n); S.tradeLog = [{type:MDATA.mode==='add'?'DEPOSIT':'WITHDRAW',ticker:'—',shares:'—',price:n,date:new Date().toISOString()}, ...S.tradeLog]; }
      MODAL = null; render();
    };
    sheet.appendChild(btn);
  }

  else if (MODAL === 'buy') {
    const isTicker = MDATA.ticker;
    const ex = isTicker ? S.positions.find(p => p.ticker === isTicker) : null;
    const uniStock = isTicker ? S.universe.find(u => u.ticker === isTicker) : null;
    const livePrice = uniStock?.quoteData?.price || null;
    const ma50 = uniStock?.quoteData?.ma50 || null;

    hdr(isTicker ? 'Buy ' + isTicker : 'New Buy');

    // ── Market Pulse Warning ─────────────────────────────────────────────────
    if (S.marketPulse === 'red') {
      sheet.appendChild(h('div', {style:{background:'rgba(255,77,109,0.12)', border:'1px solid rgba(255,77,109,0.4)', borderRadius:'10px', padding:'12px', marginBottom:'12px', fontFamily:'monospace', fontSize:'11px', color:'#ff4d6d', lineHeight:'1.6'}},
        h('div', {style:{fontWeight:'700', marginBottom:'4px'}}, '⚠ Market in Downtrend'),
        'S&P is below its 50-day MA. Entering now goes against the trend. Proceed only if you have strong conviction and tight sizing.'
      ));
    } else if (S.marketPulse === 'yellow') {
      sheet.appendChild(h('div', {style:{background:'rgba(255,200,74,0.1)', border:'1px solid rgba(255,200,74,0.3)', borderRadius:'10px', padding:'12px', marginBottom:'12px', fontFamily:'monospace', fontSize:'11px', color:'#ffc84a', lineHeight:'1.6'}},
        h('div', {style:{fontWeight:'700', marginBottom:'4px'}}, '◆ Market Choppy'),
        'S&P is near a key level. Consider half sizing until trend clarifies.'
      ));
    }

    // ── Stock info row ───────────────────────────────────────────────────────
    if (livePrice) {
      sheet.appendChild(h('div', {style:{background:'#0a0c10', borderRadius:'10px', padding:'12px', marginBottom:'14px', display:'flex', justifyContent:'space-between', alignItems:'center'}},
        h('div', {}, h('div', {style:{color:'#636b82', fontSize:'9px', fontFamily:'monospace', letterSpacing:'1.5px'}}, 'LAST PRICE'),
          h('div', {style:{color:'#e8eaf0', fontFamily:'monospace', fontSize:'18px', fontWeight:'700'}}, '$' + livePrice.toFixed(2))),
        ma50 ? h('div', {style:{textAlign:'right'}}, h('div', {style:{color:'#636b82', fontSize:'9px', fontFamily:'monospace', letterSpacing:'1.5px'}}, '50-DAY MA'),
          h('div', {style:{color: livePrice > ma50 ? '#00e5a0' : '#ff4d6d', fontFamily:'monospace', fontSize:'14px', fontWeight:'700'}}, '$' + ma50.toFixed(0))) : h('span',{})
      ));
    }

    if (!isTicker) sheet.appendChild(mkTxt('buy-ticker', 'TICKER', 'e.g. NVDA'));

    // ── Step 1: Risk % input ─────────────────────────────────────────────────
    sheet.appendChild(h('div', {cls:'field'},
      h('label', {}, 'RISK % OF PORTFOLIO'),
      h('div', {style:{position:'relative'}},
        h('input', {type:'number', id:'buy-risk-pct', placeholder:'1.0', step:'0.1', min:'0.1', max:'5',
          style:{width:'100%', background:'#0a0c10', border:'1px solid #242836', borderRadius:'10px', padding:'11px 36px 11px 12px', color:'#e8eaf0', fontSize:'14px', fontFamily:'monospace', outline:'none'}}),
        h('span', {style:{position:'absolute', right:'12px', top:'50%', transform:'translateY(-50%)', color:'#636b82', fontFamily:'monospace', fontSize:'13px', pointerEvents:'none'}}, '%')
      ),
      h('div', {cls:'hint'}, "Max $ you're willing to lose on this trade. 1% of $" + fmt(S.pot) + " = " + fmt(S.pot * 0.01))
    ));

    // ── Step 2: Entry price + stop ───────────────────────────────────────────
    sheet.appendChild(h('div', {cls:'col2'}, mkNum('buy-price','ENTRY PRICE',true), mkNum('buy-stop','STOP LOSS',true)));

    // ── Calculated outputs panel ─────────────────────────────────────────────
    const calcPanel = h('div', {id:'buy-calc', style:{display:'none', background:'#0a0c10', borderRadius:'12px', padding:'14px', marginBottom:'14px'}});
    sheet.appendChild(calcPanel);

    // ── Thesis ───────────────────────────────────────────────────────────────
    sheet.appendChild(h('div', {cls:'field'},
      h('label', {}, 'THESIS'),
      h('input', {type:'text', id:'buy-thesis', placeholder:'Why are you entering?',
        style:{width:'100%', background:'#0a0c10', border:'1px solid #242836', borderRadius:'10px', padding:'11px 12px', color:'#e8eaf0', fontSize:'14px', fontFamily:'monospace', outline:'none'}})
    ));

    // ── Go/No-Go verdict ─────────────────────────────────────────────────────
    const verdictEl = h('div', {id:'buy-verdict', style:{display:'none', borderRadius:'10px', padding:'12px', marginBottom:'12px', fontFamily:'monospace', fontSize:'11px', lineHeight:'1.7'}});
    sheet.appendChild(verdictEl);

    // ── Confirm button ───────────────────────────────────────────────────────
    const buyBtn = h('button', {cls:'btn btn-success btn-full', id:'buy-confirm-btn'}, 'Confirm Buy');
    buyBtn.onclick = () => {
      const ticker = (document.getElementById('buy-ticker')?.value || MDATA.ticker || '').toUpperCase();
      const price  = parseFloat(document.getElementById('buy-price')?.value) || 0;
      const stop   = parseFloat(document.getElementById('buy-stop')?.value) || null;
      const thesis = document.getElementById('buy-thesis')?.value || '';
      const theme  = uniStock?.theme || '';
      // Read shares and target from calc panel data attributes
      const shares = parseFloat(buyBtn.dataset.shares || 0);
      const target2 = parseFloat(buyBtn.dataset.target2 || 0) || null;
      const target3 = parseFloat(buyBtn.dataset.target3 || 0) || null;
      const target  = target2 || null;
      const total   = price * shares;
      if (ticker && price && shares && total <= S.cash) {
        const ex2 = S.positions.find(p => p.ticker === ticker);
        if (ex2) S.positions = S.positions.map(p => p.ticker!==ticker ? p : {...p, lots:[...p.lots,{price,shares,date:new Date().toISOString()}], stop:stop||p.stop, target:target||p.target, thesis:thesis||p.thesis});
        else S.positions = [...S.positions, {ticker,theme,thesis,stop,target,currentPrice:price,lots:[{price,shares,date:new Date().toISOString()}],addedAt:new Date().toISOString()}];
        S.cash -= total;
        S.tradeLog = [{type:'BUY',ticker,shares,price,stop,target,date:new Date().toISOString()}, ...S.tradeLog];
        const ui = S.universe.findIndex(u => u.ticker === ticker);
        if (ui >= 0) S.universe[ui].stage = 'ACTIVE';
      }
      MODAL = null; render();
    };
    sheet.appendChild(buyBtn);

    // ── Live calculation engine ───────────────────────────────────────────────
    function recalc() {
      const entry   = parseFloat(document.getElementById('buy-price')?.value) || 0;
      const stop    = parseFloat(document.getElementById('buy-stop')?.value) || 0;
      const riskPct = parseFloat(document.getElementById('buy-risk-pct')?.value) || 0;
      const panel   = document.getElementById('buy-calc');
      const verdict = document.getElementById('buy-verdict');
      const btn     = document.getElementById('buy-confirm-btn');
      if (!panel || !verdict || !btn) return;

      if (!entry || !stop || !riskPct || !S.pot) { panel.style.display='none'; verdict.style.display='none'; return; }

      const riskDollar   = S.pot * (riskPct / 100);
      const riskPerShare = entry - stop;
      if (riskPerShare <= 0) {
        panel.style.display = 'none';
        verdict.style.display = 'block';
        verdict.style.background = 'rgba(255,77,109,0.1)';
        verdict.style.border = '1px solid rgba(255,77,109,0.3)';
        verdict.style.color = '#ff4d6d';
        verdict.innerHTML = '✗ Stop must be below entry price.';
        return;
      }

      const shares       = Math.floor(riskDollar / riskPerShare);
      const positionSize = shares * entry;
      const posPct       = (positionSize / S.pot) * 100;
      const reward2      = riskPerShare * 2;
      const reward3      = riskPerShare * 3;
      const target2      = entry + reward2;
      const target3      = entry + reward3;
      const rr           = reward2 / riskPerShare; // always 2 by definition
      const stopPct      = ((entry - stop) / entry) * 100;

      // Store for confirm button
      btn.dataset.shares  = shares;
      btn.dataset.target2 = target2.toFixed(2);
      btn.dataset.target3 = target3.toFixed(2);

      // Build calc panel
      panel.style.display = 'block';
      panel.innerHTML = '';

      const row = (label, val, color) => {
        const d = document.createElement('div');
        d.style.cssText = 'display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid #242836;';
        d.innerHTML = '<span style="font-size:9px;color:#636b82;font-family:monospace;letter-spacing:1px;">' + label + '</span>' +
                      '<span style="font-family:monospace;font-size:12px;font-weight:700;color:' + (color||'#e8eaf0') + '">' + val + '</span>';
        return d;
      };

      panel.appendChild(row('RISK AMOUNT', fmt(riskDollar), '#ffc84a'));
      panel.appendChild(row('RISK PER SHARE', fmt(riskPerShare), '#ff4d6d'));
      panel.appendChild(row('STOP %', '-' + stopPct.toFixed(1) + '%', '#ff4d6d'));
      panel.appendChild(row('SHARES TO BUY', String(shares), '#e8eaf0'));
      panel.appendChild(row('POSITION SIZE', fmt(positionSize) + '  (' + posPct.toFixed(1) + '% of pot)', posPct > 15 ? '#ff4d6d' : posPct > 10 ? '#ffc84a' : '#00e5a0'));
      panel.appendChild(row('TARGET 2:1', '$' + target2.toFixed(2) + '  (+' + (reward2/entry*100).toFixed(1) + '%)', '#00e5a0'));
      panel.appendChild(row('TARGET 3:1', '$' + target3.toFixed(2) + '  (+' + (reward3/entry*100).toFixed(1) + '%)', '#4f8fff'));

      // Go/No-Go checks
      const checks = [];
      const fails  = [];

      if (S.marketPulse === 'red')    checks.push({ok:false, warn:true,  msg:'Market downtrend — high risk environment'});
      if (S.marketPulse === 'yellow') checks.push({ok:true,  warn:true,  msg:'Market choppy — reduce size if unsure'});
      if (posPct > 15)   fails.push('Position size ' + posPct.toFixed(1) + '% exceeds 15% max');
      if (stopPct > 12)  fails.push('Stop is ' + stopPct.toFixed(1) + '% away — too loose (max 12%)');
      if (!S.cash || positionSize > S.cash) fails.push('Insufficient cash (' + fmt(S.cash) + ' available)');
      if (shares < 1)    fails.push('Risk % too small — results in 0 shares');

      const goNo = fails.length === 0;
      verdict.style.display = 'block';
      verdict.style.background = goNo ? 'rgba(0,229,160,0.08)' : 'rgba(255,77,109,0.08)';
      verdict.style.border = '1px solid ' + (goNo ? 'rgba(0,229,160,0.3)' : 'rgba(255,77,109,0.3)');
      verdict.style.color = goNo ? '#00e5a0' : '#ff4d6d';
      verdict.innerHTML = '';

      if (goNo) {
        const hd = document.createElement('div');
        hd.style.cssText = 'font-weight:700;margin-bottom:6px;font-size:13px;';
        hd.textContent = '✓ GO — Trade looks clean';
        verdict.appendChild(hd);
        checks.forEach(c => {
          const d = document.createElement('div');
          d.style.color = '#ffc84a';
          d.textContent = '◆ ' + c.msg;
          verdict.appendChild(d);
        });
        btn.disabled = false;
        btn.style.opacity = '1';
        btn.textContent = 'Confirm Buy — ' + shares + ' shares @ $' + entry.toFixed(2);
      } else {
        const hd = document.createElement('div');
        hd.style.cssText = 'font-weight:700;margin-bottom:6px;font-size:13px;';
        hd.textContent = '✗ NO-GO';
        verdict.appendChild(hd);
        fails.forEach(f => {
          const d = document.createElement('div');
          d.textContent = '✗ ' + f;
          verdict.appendChild(d);
        });
        btn.disabled = true;
        btn.style.opacity = '0.4';
        btn.textContent = 'Confirm Buy';
      }
    }

    setTimeout(() => {
      if (livePrice) { const e = document.getElementById('buy-price'); if(e&&!e.value) e.value = livePrice.toFixed(2); }
      if (ma50)      { const e = document.getElementById('buy-stop');  if(e&&!e.value) e.value = ma50.toFixed(2); }
      if (ex?.thesis){ const e = document.getElementById('buy-thesis'); if(e) e.value = ex.thesis; }
      // Set default risk %
      const riskEl = document.getElementById('buy-risk-pct');
      if (riskEl && !riskEl.value) riskEl.value = '1';
      // Wire all inputs to recalc
      ['buy-price','buy-stop','buy-risk-pct'].forEach(id => {
        const el = document.getElementById(id);
        if (el) el.oninput = recalc;
      });
      recalc();
    }, 50);
  }

  else if (MODAL === 'sell') {
    const p = MDATA.position;
    const sh = getShares(p), avg = getAvgCost(p);
    const cur = p.currentPrice || avg;
    const days = daysSince(p.lots[0]?.date);
    const unrealPL = (cur - avg) / avg * 100;
    hdr('Exit ' + p.ticker);

    // ── Position summary ─────────────────────────────────────────────────────
    const summaryBox = h('div', {style:{background:'#0a0c10', borderRadius:'12px', padding:'14px', marginBottom:'14px'}});
    const sRow = (label, val, color) => {
      const d = document.createElement('div');
      d.style.cssText = 'display:flex;justify-content:space-between;align-items:center;padding:4px 0;';
      d.innerHTML = '<span style="font-size:9px;color:#636b82;font-family:monospace;letter-spacing:1px;">' + label + '</span>' +
                    '<span style="font-family:monospace;font-size:12px;font-weight:700;color:' + (color||'#e8eaf0') + '">' + val + '</span>';
      return d;
    };
    summaryBox.appendChild(sRow('SHARES', String(sh)));
    summaryBox.appendChild(sRow('AVG COST', fmt(avg)));
    summaryBox.appendChild(sRow('CURRENT PRICE', fmt(cur)));
    summaryBox.appendChild(sRow('UNREALIZED P&L', (unrealPL >= 0 ? '+' : '') + unrealPL.toFixed(2) + '%', unrealPL >= 0 ? '#00e5a0' : '#ff4d6d'));
    summaryBox.appendChild(sRow('DAYS HELD', String(days), days > 42 ? '#ffc84a' : '#e8eaf0'));
    if (p.stop)   summaryBox.appendChild(sRow('STOP', fmt(p.stop) + '  (' + ((cur-p.stop)/cur*100).toFixed(1) + '% away)', '#ff4d6d'));
    if (p.target) summaryBox.appendChild(sRow('TARGET', fmt(p.target) + '  (' + ((p.target-cur)/cur*100).toFixed(1) + '% away)', '#00e5a0'));
    sheet.appendChild(summaryBox);

    // ── Exit reason flags ────────────────────────────────────────────────────
    const flags = [];
    if (p.stop   && cur <= p.stop)                    flags.push({color:'#ff4d6d', msg:'⛔ Stop triggered — price at or below stop'});
    if (p.target && cur >= p.target)                  flags.push({color:'#00e5a0', msg:'🎯 Target reached — consider full exit'});
    if (days > 42 && Math.abs(unrealPL) < 5)         flags.push({color:'#ffc84a', msg:'⏱ Dead money — held ' + days + 'd with <5% move'});
    if (unrealPL >= 20 && p.stop && cur > avg)        flags.push({color:'#4f8fff', msg:'↑ Up 20%+ — move stop to breakeven if not done'});
    if (flags.length) {
      const flagBox = h('div', {style:{borderRadius:'10px', padding:'10px 12px', marginBottom:'12px', background:'rgba(255,200,74,0.07)', border:'1px solid rgba(255,200,74,0.2)'}});
      flags.forEach(f => {
        const d = document.createElement('div');
        d.style.cssText = 'font-family:monospace;font-size:11px;color:' + f.color + ';padding:2px 0;';
        d.textContent = f.msg;
        flagBox.appendChild(d);
      });
      sheet.appendChild(flagBox);
    }

    // ── Exit type selector ───────────────────────────────────────────────────
    sheet.appendChild(h('div', {cls:'label', style:{marginBottom:'8px'}}, 'EXIT REASON'));
    const exitTypes = [
      {id:'exit-stop',   label:'Stop Hit',    color:'#ff4d6d'},
      {id:'exit-target', label:'Target Hit',  color:'#00e5a0'},
      {id:'exit-time',   label:'Time Stop',   color:'#ffc84a'},
      {id:'exit-manual', label:'Manual Exit', color:'#636b82'},
    ];
    const exitRow = h('div', {style:{display:'flex', gap:'6px', marginBottom:'14px', flexWrap:'wrap'}});
    let selectedExit = p.stop && cur <= p.stop ? 'exit-stop' : p.target && cur >= p.target ? 'exit-target' : days > 42 ? 'exit-time' : 'exit-manual';
    exitTypes.forEach(et => {
      const btn = h('button', {style:{padding:'6px 12px', borderRadius:'8px', fontFamily:'monospace', fontSize:'10px', cursor:'pointer',
        border:'1px solid ' + (selectedExit===et.id ? et.color : '#242836'),
        background: selectedExit===et.id ? et.color + '22' : 'transparent',
        color: selectedExit===et.id ? et.color : '#636b82'}}, et.label);
      btn.onclick = () => {
        selectedExit = et.id;
        exitRow.querySelectorAll('button').forEach((b, i) => {
          const e2 = exitTypes[i];
          b.style.border = '1px solid ' + (selectedExit===e2.id ? e2.color : '#242836');
          b.style.background = selectedExit===e2.id ? e2.color + '22' : 'transparent';
          b.style.color = selectedExit===e2.id ? e2.color : '#636b82';
        });
      };
      exitRow.appendChild(btn);
    });
    sheet.appendChild(exitRow);

    // ── Sell price + shares ──────────────────────────────────────────────────
    sheet.appendChild(h('div', {cls:'col2'}, mkNum('sell-price','SELL PRICE',true), mkNum('sell-shares','SHARES',false,'max '+sh)));
    const plRow = h('div', {id:'sell-pl-row', style:{display:'none', background:'#0a0c10', borderRadius:'10px', padding:'12px', marginBottom:'12px'}});
    sheet.appendChild(plRow);

    // ── Buttons ──────────────────────────────────────────────────────────────
    const btnRow = h('div', {cls:'col2'});
    const allBtn = h('button', {cls:'btn btn-ghost btn-sm'}, 'All (' + sh + ' shares)');
    allBtn.onclick = () => { const e=document.getElementById('sell-shares'); if(e){e.value=sh; e.dispatchEvent(new Event('input'));} };
    const sellBtn = h('button', {cls:'btn btn-danger btn-sm'}, 'Confirm Exit');
    sellBtn.onclick = () => {
      const sp = parseFloat(document.getElementById('sell-price')?.value)  || 0;
      const ss = parseFloat(document.getElementById('sell-shares')?.value) || 0;
      const exitType = selectedExit.replace('exit-','').toUpperCase();
      if (sp && ss && ss <= sh) {
        const proceeds = sp*ss, pl2 = proceeds - ss*avg;
        if (ss >= sh) {
          S.positions = S.positions.filter(pos => pos.ticker !== p.ticker);
          const ui = S.universe.findIndex(u => u.ticker === p.ticker);
          if (ui >= 0 && S.universe[ui].stage === 'ACTIVE') { const scored = scoreStock(S.universe[ui]); S.universe[ui].stage = scored.stage; }
        } else {
          let rem = ss; const nl = [];
          for (const l of p.lots) { if(rem<=0){nl.push(l);continue;} if(l.shares<=rem){rem-=l.shares;}else{nl.push({...l,shares:l.shares-rem});rem=0;} }
          S.positions = S.positions.map(pos => pos.ticker!==p.ticker ? pos : {...pos, lots:nl});
        }
        S.cash += proceeds;
        S.tradeLog = [{type:exitType, ticker:p.ticker, shares:ss, price:sp, pl:pl2, daysHeld:days, date:new Date().toISOString()}, ...S.tradeLog];
      }
      MODAL = null; render();
    };
    btnRow.appendChild(allBtn); btnRow.appendChild(sellBtn);
    sheet.appendChild(btnRow);

    setTimeout(() => {
      if (cur) { const e = document.getElementById('sell-price'); if(e&&!e.value) e.value = cur.toFixed(2); }
      ['sell-price','sell-shares'].forEach(id => {
        const el = document.getElementById(id);
        if (el) el.oninput = () => {
          const sp2=parseFloat(document.getElementById('sell-price')?.value)||0;
          const ss2=parseFloat(document.getElementById('sell-shares')?.value)||0;
          const proceeds=sp2*ss2, pl2=proceeds-ss2*avg;
          const rr = p.stop ? ((sp2-avg)/(avg-p.stop)).toFixed(2) : null;
          if(plRow&&sp2&&ss2&&ss2<=sh){
            plRow.style.display='block'; plRow.innerHTML='';
            const pr = document.createElement('div'); pr.style.cssText='display:flex;justify-content:space-between;margin-bottom:6px;'; pr.innerHTML='<span style="font-size:9px;color:#636b82;font-family:monospace;letter-spacing:1px;">PROCEEDS</span><span style="font-family:monospace;font-size:12px;font-weight:700;">' + fmt(proceeds) + '</span>'; plRow.appendChild(pr);
            const plEl = document.createElement('div'); plEl.style.cssText='display:flex;justify-content:space-between;margin-bottom:6px;'; plEl.innerHTML='<span style="font-size:9px;color:#636b82;font-family:monospace;letter-spacing:1px;">P&L</span><span style="font-family:monospace;font-size:12px;font-weight:700;color:' + (pl2>=0?'#00e5a0':'#ff4d6d') + '">' + fmt(pl2) + '  (' + (pl2>=0?'+':'') + ((pl2/(avg*ss2))*100).toFixed(1) + '%)</span>'; plRow.appendChild(plEl);
            if (rr) { const rrEl = document.createElement('div'); rrEl.style.cssText='display:flex;justify-content:space-between;'; rrEl.innerHTML='<span style="font-size:9px;color:#636b82;font-family:monospace;letter-spacing:1px;">R:R ACHIEVED</span><span style="font-family:monospace;font-size:12px;font-weight:700;color:' + (parseFloat(rr)>=2?'#00e5a0':parseFloat(rr)>=1?'#ffc84a':'#ff4d6d') + '">' + rr + ':1</span>'; plRow.appendChild(rrEl); }
          }
        };
      });
      // Auto-fill sell price and trigger calc
      const sp = document.getElementById('sell-price');
      const ss = document.getElementById('sell-shares');
      if (sp) sp.dispatchEvent(new Event('input'));
      if (ss) { ss.value = sh; ss.dispatchEvent(new Event('input')); }
    }, 50);
  }

  else if (MODAL === 'price') {
    const p = MDATA.position, avg = getAvgCost(p);
    hdr('Update ' + p.ticker);
    sheet.appendChild(cashRow('AVG COST', fmt(avg), '#e8eaf0'));
    sheet.appendChild(mkNum('cur-price','CURRENT PRICE',true,'0.00'));
    const plDisp = h('div', {id:'price-pl', style:{display:'none', borderRadius:'10px', padding:'12px', marginBottom:'12px', justifyContent:'space-between'}});
    sheet.appendChild(plDisp);
    const upBtn = h('button', {cls:'btn btn-primary btn-full'}, 'Update Price');
    upBtn.onclick = () => {
      const cur = parseFloat(document.getElementById('cur-price')?.value) || 0;
      if (cur) S.positions = S.positions.map(pos => pos.ticker!==p.ticker ? pos : {...pos, currentPrice:cur});
      MODAL = null; render();
    };
    sheet.appendChild(upBtn);
    setTimeout(() => {
      if (p.currentPrice) { const e=document.getElementById('cur-price'); if(e) e.value=p.currentPrice; }
      const inp = document.getElementById('cur-price');
      if (inp) inp.oninput = () => { const cur=parseFloat(inp.value)||0; const plp=(cur-avg)/avg*100; if(plDisp&&cur){plDisp.style.display='flex';plDisp.innerHTML='';plDisp.appendChild(h('span',{cls:'label'},'UNREALIZED P&L'));plDisp.appendChild(h('span',{cls:'mono',style:{color:plp>=0?'#00e5a0':'#ff4d6d'}},pct(plp)));plDisp.style.background=plp>=0?'rgba(0,229,160,0.07)':'rgba(255,77,109,0.07)';plDisp.style.border='1px solid '+(plp>=0?'rgba(0,229,160,0.27)':'rgba(255,77,109,0.27)');} };
    }, 50);
  }

  else if (MODAL === 'watchlist') {
    hdr('Add to Watchlist');
    sheet.appendChild(mkTxt('wl-ticker','TICKER','e.g. MSFT'));
    sheet.appendChild(h('div', {cls:'field'}, h('label',{},'THEME'), h('input',{type:'text',id:'wl-theme',placeholder:'e.g. Financials'})));
    sheet.appendChild(h('div', {cls:'field'}, h('label',{},'THESIS'), h('input',{type:'text',id:'wl-thesis',placeholder:'Why watching?'})));
    const fl = h('div', {cls:'field'}, h('label', {}, 'FILTERS PASSED'));
    const fr = h('div', {style:{display:'flex', gap:'6px'}});
    ['fundamental','technical','thematic'].forEach(k => {
      const b = h('button', {cls:'filter-btn' + (MDATA.filters?.[k]?' on':'')}, k);
      b.onclick = () => { MDATA.filters = MDATA.filters||{}; MDATA.filters[k]=!MDATA.filters[k]; b.className='filter-btn'+(MDATA.filters[k]?' on':''); };
      fr.appendChild(b);
    });
    fl.appendChild(fr); sheet.appendChild(fl);
    const addBtn2 = h('button', {cls:'btn btn-primary btn-full'}, 'Add to Watchlist');
    addBtn2.onclick = () => {
      const ticker = (document.getElementById('wl-ticker')?.value||'').toUpperCase();
      const theme  = document.getElementById('wl-theme')?.value||'';
      const thesis = document.getElementById('wl-thesis')?.value||'';
      if (ticker) S.watchlist = [{ticker,theme,thesis,filters:MDATA.filters||{},addedAt:new Date().toISOString()}, ...S.watchlist.filter(w=>w.ticker!==ticker)];
      MODAL = null; render();
    };
    sheet.appendChild(addBtn2);
  }

  else if (MODAL === 'manual-score') {
    const u = MDATA.stock;
    hdr('Score ' + u.ticker + ' manually');
    h('div', {style:{fontSize:'11px', color:'#636b82', fontFamily:'monospace', marginBottom:'14px', lineHeight:'1.6'}}, 'Check signals you can confirm from Yahoo Finance / TradingView. Score updates instantly.');
    sheet.appendChild(h('div', {style:{fontSize:'11px', color:'#636b82', fontFamily:'monospace', marginBottom:'14px', lineHeight:'1.6'}}, 'Check signals you can confirm from Yahoo Finance / TradingView.'));

    const SIGNALS = [
      {key:'revenueGrowth', cat:'FUNDAMENTAL', label:'Revenue Growth > 15% YoY'},
      {key:'earningsBeat',  cat:'FUNDAMENTAL', label:'Positive Earnings Surprise'},
      {key:'pfcf',          cat:'FUNDAMENTAL', label:'P/FCF < 25'},
      {key:'peg',           cat:'FUNDAMENTAL', label:'PEG Ratio < 1.5'},
      {key:'evEbitda',      cat:'FUNDAMENTAL', label:'EV/EBITDA < 15'},
      {key:'pbRoe',         cat:'FUNDAMENTAL', label:'P/B < 3 AND ROE > 15%'},
      {key:'sectorEtfUp',      cat:'THEMATIC',    label:'Sector ETF in Uptrend'},
      {key:'themeRS',       cat:'THEMATIC',    label:'Theme Outperforming S&P'},
      {key:'above50',       cat:'TECHNICAL',   label:'Price Above 50-Day MA'},
      {key:'above200',      cat:'TECHNICAL',   label:'Price Above 200-Day MA'},
      {key:'pullback',      cat:'TECHNICAL',   label:'Pulled Back to Support'},
      {key:'volume',        cat:'TECHNICAL',   label:'Volume Pattern Healthy'},
      {key:'rs',            cat:'TECHNICAL',   label:'RS Stronger than S&P'},
    ];

    // Build synthetic quoteData from checked signals
    const checks = u.manualChecks || {};
    let curCat = '';
    SIGNALS.forEach(sig => {
      if (sig.cat !== curCat) {
        curCat = sig.cat;
        const catColors = {FUNDAMENTAL:'#4f8fff', THEMATIC:'#ffc84a', TECHNICAL:'#00e5a0'};
        sheet.appendChild(h('div', {style:{fontSize:'9px', color:catColors[sig.cat], fontFamily:'monospace', letterSpacing:'1.5px', margin:'10px 0 6px'}}, sig.cat));
      }
      const checked = !!checks[sig.key];
      const row = h('div', {style:{display:'flex', alignItems:'center', gap:'10px', padding:'8px 0', borderBottom:'1px solid #1a1e28', cursor:'pointer'}},
        h('div', {style:{width:'18px', height:'18px', borderRadius:'5px', border:'2px solid '+(checked?'#4f8fff':'#363c50'), background:checked?'rgba(79,143,255,0.2)':'transparent', flexShrink:'0', display:'flex', alignItems:'center', justifyContent:'center'}},
          checked ? h('span', {style:{color:'#4f8fff', fontSize:'11px', fontWeight:'700'}}, '✓') : null
        ),
        h('div', {style:{fontSize:'12px', color:checked?'#e8eaf0':'#9da3b4'}}, sig.label)
      );
      row.onclick = () => {
        const idx = S.universe.findIndex(x => x.ticker === u.ticker);
        if (idx < 0) return;
        if (!S.universe[idx].manualChecks) S.universe[idx].manualChecks = {};
        S.universe[idx].manualChecks[sig.key] = !S.universe[idx].manualChecks[sig.key];
        // Convert checks to synthetic quoteData for scoring
        const mc = S.universe[idx].manualChecks;
        // Temporarily override globals so thematic signals respect manual checks
        const _spySave = SPY_1M, _etfSave = {...ETF_1M};
        const etfSym = SECTOR_ETF[S.universe[idx].sector];
        SPY_1M = 0;
        if (etfSym) ETF_1M[etfSym] = mc.sectorEtfUp ? 1 : -1;
        S.universe[idx].quoteData = {
          price: 100, ma50: mc.above50 ? 95 : 105, ma200: mc.above200 ? 90 : 110,
          stock1M: mc.rs ? 5 : -3, volumeRatio: mc.volume ? 1.5 : 0.7,
          revenueGrowthYoY: mc.revenueGrowth ? 20 : 5,
          earningsSurprise: mc.earningsBeat ? 0.1 : -0.1,
          priceToFCF: mc.pfcf ? 18 : 35, pegRatio: mc.peg ? 1.2 : 2.5,
          evToEbitda: mc.evEbitda ? 10 : 22, pb: mc.pbRoe ? 2 : 4, roe: mc.pbRoe ? 0.20 : 0.08,
        };
        const scored = scoreStock(S.universe[idx]);
        // Restore globals
        SPY_1M = _spySave; ETF_1M = _etfSave;
        S.universe[idx].score     = scored.total;
        S.universe[idx].breakdown = scored.breakdown;
        S.universe[idx].signals   = scored.signals;
        S.universe[idx].reason    = scored.reason;
        if (S.universe[idx].stage !== 'ACTIVE') S.universe[idx].stage = scored.stage;
        MDATA.stock = S.universe[idx];
        saveState();
        render();
      };
      sheet.appendChild(row);
    });

    const doneBtn = h('button', {cls:'btn btn-primary btn-full', style:{marginTop:'16px'}}, 'Done');
    doneBtn.onclick = () => { MODAL = null; render(); };
    sheet.appendChild(doneBtn);
  }

  else if (MODAL === 'apikey') {
    hdr('FMP API Key');
    sheet.appendChild(h('div', {style:{fontSize:'11px', color:'#9da3b4', fontFamily:'monospace', lineHeight:'1.7', marginBottom:'16px'}},
      '1. Sign up at financialmodelingprep.com', h('br',{}),
      '2. Go to Dashboard and copy your API key', h('br',{}),
      '3. Paste it below and tap Save', h('br',{}),
      '4. Starter plan: 300 calls/min — full auto-scoring'
    ));
    const keyInput = h('input', {type:'text', id:'av-key-input', placeholder:'Paste your key here e.g. ABC123XYZ', style:{width:'100%', background:'#0a0c10', border:'1px solid #242836', borderRadius:'10px', padding:'12px', color:'#e8eaf0', fontSize:'13px', fontFamily:'monospace', outline:'none', marginBottom:'14px', letterSpacing:'1px'}});
    const existing = localStorage.getItem('fmp_key');
    if (existing) keyInput.value = existing;
    sheet.appendChild(keyInput);
    const saveBtn = h('button', {cls:'btn btn-primary btn-full'}, 'Save Key & Start Scoring');
    saveBtn.onclick = () => {
      const key = keyInput.value.trim();
      if (key) { localStorage.setItem('fmp_key', key); FMP_KEY = key; }
      MODAL = null; render();
    };
    sheet.appendChild(saveBtn);
    if (existing) {
      const clearBtn = h('button', {cls:'btn btn-ghost btn-full', style:{marginTop:'8px'}}, 'Clear Saved Key');
      clearBtn.onclick = () => { localStorage.removeItem('fmp_key'); FMP_KEY = ''; MODAL = null; render(); };
      sheet.appendChild(clearBtn);
    }
  }

  else if (MODAL === 'pulse') {
    hdr('Market Pulse');
    sheet.appendChild(h('div', {style:{fontSize:'11px', color:'#636b82', fontFamily:'monospace', marginBottom:'14px', lineHeight:'1.5'}}, 'Set each morning based on S&P 500 vs its 50-day MA.'));
    [['green','#00e5a0','▲ Green — Uptrend','S&P above 50-day MA. Risk on.'],
     ['yellow','#ffc84a','◆ Yellow — Choppy','Near key level. Caution.'],
     ['red','#ff4d6d','▼ Red — Downtrend','Below 50-day MA. Reduce risk.']
    ].forEach(([id, color, label, sub]) => {
      const active = S.marketPulse === id;
      const b = h('button', {style:{display:'flex', justifyContent:'space-between', alignItems:'center', width:'100%', marginBottom:'8px', padding:'14px', borderRadius:'12px', border:'1px solid '+(active?color:'#242836'), background:active?color+'18':'#0a0c10', cursor:'pointer', textAlign:'left'}},
        h('div', {}, h('div', {style:{color, fontFamily:'monospace', fontSize:'13px', fontWeight:'600'}}, label), h('div', {style:{color:'#636b82', fontSize:'11px', marginTop:'2px'}}, sub)),
        active ? h('span', {style:{color}}, '●') : h('span', {}, '')
      );
      b.onclick = () => { S.marketPulse = id; MODAL = null; render(); };
      sheet.appendChild(b);
    });
  }

  else if (MODAL === 'add-universe') {
    hdr('Add Stock to Universe');
    sheet.appendChild(mkTxt('uni-ticker','TICKER','e.g. AAPL'));
    sheet.appendChild(h('div', {cls:'field'}, h('label',{},'COMPANY NAME'), h('input',{type:'text',id:'uni-name',placeholder:'e.g. Apple Inc'})));
    const themeField = h('div', {cls:'field'}, h('label', {}, 'THEME'));
    const sel = h('select', {id:'uni-theme', style:{width:'100%', background:'#0a0c10', border:'1px solid #242836', borderRadius:'10px', padding:'11px 12px', color:'#e8eaf0', fontSize:'14px', fontFamily:'monospace', outline:'none'}});
    ['AI & Infrastructure','Semiconductors','Financials & Banking','Energy & Grid','Defense & Industrial','Healthcare & Biotech','Consumer & E-Commerce','Industrials & Automation','Data Centers & REIT','Commodities & Mining'].forEach(t => sel.appendChild(h('option', {value:t}, t)));
    themeField.appendChild(sel); sheet.appendChild(themeField);
    const addBtn3 = h('button', {cls:'btn btn-primary btn-full'}, 'Add to Universe');
    addBtn3.onclick = () => {
      const ticker = (document.getElementById('uni-ticker')?.value||'').toUpperCase();
      const name   = document.getElementById('uni-name')?.value||'';
      const theme  = document.getElementById('uni-theme')?.value||'';
      const sectorMap = {'AI & Infrastructure':'ai','Semiconductors':'semi','Financials & Banking':'fin','Energy & Grid':'energy','Defense & Industrial':'defense','Healthcare & Biotech':'health','Consumer & E-Commerce':'consumer','Industrials & Automation':'industrial','Data Centers & REIT':'reit','Commodities & Mining':'commodity'};
      if (ticker && !S.universe.find(u => u.ticker === ticker)) {
        S.universe.push({ticker, name, theme, sector:sectorMap[theme]||'ai', score:null, breakdown:null, signals:{}, stage:'WATCHING', quoteData:null, reason:null});
      }
      MODAL = null; render();
    };
    sheet.appendChild(addBtn3);
  }

  return overlay;
}

// ═══════════════════════════════════════════════════════
// BIND EVENTS (minimal — most handlers are inline onclicks)
// ═══════════════════════════════════════════════════════
function bindEvents() {
  // nothing — all events are set inline via onclick in the builder functions
}

// ═══════════════════════════════════════════════════════
// EXPORT / IMPORT
// ═══════════════════════════════════════════════════════
function doExport() {
  const blob = new Blob([JSON.stringify(S, null, 2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'sandbox-' + new Date().toISOString().slice(0,10) + '.json';
  a.click(); URL.revokeObjectURL(url);
}
function doImport(e) {
  const file = e.target.files[0]; if (!file) return;
  const r = new FileReader();
  r.onload = ev => { try { S = {...DEF, ...JSON.parse(ev.target.result)}; render(); } catch { alert('Invalid file'); } };
  r.readAsText(file);
}

// ─── Boot ─────────────────────────────────────────────
// Detect sandboxed iframe (Claude.ai preview) vs real browser
function isIframeSandboxed() {
  try { return window.self !== window.top; } catch(e) { return true; }
}

if (isIframeSandboxed()) {
  // Show a one-time banner
  const banner = document.createElement('div');
  banner.style.cssText = 'position:fixed;top:0;left:0;right:0;background:#ffc84a;color:#0a0c10;padding:10px 16px;font-size:12px;font-family:monospace;z-index:9999;display:flex;justify-content:space-between;align-items:center;';
  banner.innerHTML = '<span>⬇ Download this file and open it in your browser for live data (fetch is blocked in preview)</span><button onclick="this.parentElement.remove()" style="background:transparent;border:none;cursor:pointer;font-size:16px;padding:0 4px;">✕</button>';
  document.body.appendChild(banner);
}

render();
</script>
