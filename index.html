<title>Trading Sandbox</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{background:#0a0c10;color:#e8eaf0;font-family:'Segoe UI',system-ui,sans-serif;max-width:480px;margin:0 auto;min-height:100vh;}
input,select,textarea{font-family:inherit;}
button{font-family:monospace;}
::-webkit-scrollbar{width:0;}
.mono{font-family:monospace;}
.label{font-size:10px;color:#636b82;letter-spacing:1.5px;text-transform:uppercase;font-family:monospace;}
.header{padding:48px 20px 0;background:linear-gradient(180deg,#0d1017 0%,#0a0c10 100%);}
.content{padding:16px 20px 120px;}
.tabs{display:flex;background:#12151c;border-radius:12px;padding:3px;overflow-x:auto;}
.tab{flex:1;min-width:0;padding:8px 2px;border-radius:9px;border:none;background:transparent;color:#636b82;font-family:monospace;font-size:9px;cursor:pointer;position:relative;transition:all 0.15s;white-space:nowrap;}
.tab.active{background:#4f8fff;color:#fff;font-weight:600;}
.badge{position:absolute;top:2px;right:2px;background:#ff4d6d;color:#fff;border-radius:6px;font-size:7px;padding:1px 3px;}
.card{background:#181c26;border:1px solid #242836;border-radius:14px;margin-bottom:10px;overflow:hidden;}
.card-inner{padding:14px 16px;}
.stat-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin:14px 0;}
.stat-box{background:#12151c;border-radius:10px;padding:10px 12px;}
.field{margin-bottom:14px;}
.field label{display:block;font-size:10px;color:#636b82;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:5px;font-family:monospace;}
.field input,.field select,.field textarea{width:100%;background:#0a0c10;border:1px solid #242836;border-radius:10px;padding:11px 12px;color:#e8eaf0;font-size:14px;font-family:monospace;outline:none;}
.field input.prefix{padding-left:26px;}
.prefix-sym{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:#636b82;font-size:13px;pointer-events:none;}
.field-wrap{position:relative;}
.hint{font-size:10px;color:#636b82;margin-top:3px;font-family:monospace;}
.btn{border:none;border-radius:10px;padding:12px 18px;font-size:13px;font-weight:600;cursor:pointer;font-family:monospace;}
.btn-sm{padding:8px 12px;font-size:11px;}
.btn-xs{padding:5px 9px;font-size:10px;}
.btn-full{width:100%;}
.btn-primary{background:#4f8fff;color:#fff;}
.btn-success{background:#00e5a0;color:#0a0c10;}
.btn-danger{background:#ff4d6d;color:#fff;}
.btn-ghost{background:#242836;color:#e8eaf0;}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:100;display:flex;align-items:flex-end;justify-content:center;}
.modal-sheet{background:#12151c;border-radius:20px 20px 0 0;border:1px solid #242836;border-bottom:none;width:100%;max-width:480px;padding:0 20px 44px;max-height:92vh;overflow-y:auto;}
.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;position:sticky;top:0;background:#12151c;padding:20px 0 12px;z-index:10;border-bottom:1px solid #242836;margin-left:-0px;margin-right:-0px;}
.modal-close{background:#242836;border:none;color:#e8eaf0;border-radius:8px;padding:4px 10px;cursor:pointer;font-size:15px;}
.progress-track{height:4px;background:#242836;border-radius:2px;overflow:hidden;margin-top:8px;}
.progress-bar{height:100%;border-radius:2px;transition:width 0.3s;}
.row{display:flex;justify-content:space-between;align-items:center;}
.col2{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.col3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;}
.divider{border-bottom:1px solid #242836;}
.empty{text-align:center;padding:50px 20px;color:#636b82;}
.empty .icon{font-size:36px;margin-bottom:10px;}
.brief-card{border-radius:12px;padding:14px;margin-bottom:8px;display:flex;gap:10px;}
.brief-icon{font-size:14px;flex-shrink:0;margin-top:1px;}
.fab{position:fixed;bottom:24px;right:20px;z-index:50;border:none;border-radius:16px;padding:13px 18px;font-size:13px;font-weight:700;cursor:pointer;font-family:monospace;}
.fab-buy{background:#00e5a0;color:#0a0c10;box-shadow:0 4px 20px rgba(0,229,160,0.4);}
.fab-watch{background:#4f8fff;color:#fff;box-shadow:0 4px 20px rgba(79,143,255,0.4);}
.pulse-tag{font-size:9px;border-radius:4px;padding:2px 6px;font-family:monospace;}
.check-row{display:flex;align-items:center;gap:8px;margin-bottom:6px;}
.log-row{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid #242836;}
.type-tag{font-size:9px;font-family:monospace;padding:3px 7px;border-radius:4px;flex-shrink:0;}
.stage-tag{font-size:9px;font-family:monospace;padding:2px 7px;border-radius:4px;font-weight:700;}
.score-ring{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:monospace;font-size:13px;font-weight:700;flex-shrink:0;}
.score-bar-wrap{height:3px;background:#242836;border-radius:2px;overflow:hidden;margin-top:4px;width:100%;}
.score-bar-fill{height:100%;border-radius:2px;}
.uni-card{background:#181c26;border:1px solid #242836;border-radius:12px;padding:12px 14px;margin-bottom:8px;display:flex;gap:10px;align-items:flex-start;}
.help-section{margin-bottom:20px;}
.help-section-title{font-size:13px;font-weight:700;color:#4f8fff;margin-bottom:10px;font-family:monospace;padding:8px 0;border-bottom:1px solid #242836;}
.help-item{margin-bottom:12px;padding:12px;background:#181c26;border-radius:10px;border:1px solid #242836;}
.help-term{font-size:13px;font-weight:700;color:#e8eaf0;font-family:monospace;margin-bottom:4px;}
.help-def{font-size:12px;color:#9da3b4;line-height:1.6;}
.help-example{font-size:11px;color:#636b82;font-family:monospace;margin-top:5px;padding:6px 8px;background:#0a0c10;border-radius:6px;}
.search-box{width:100%;background:#12151c;border:1px solid #242836;border-radius:12px;padding:12px 16px;color:#e8eaf0;font-size:14px;outline:none;margin-bottom:16px;}
.search-box::placeholder{color:#636b82;}
.filter-btn{flex:1;padding:7px 4px;border-radius:8px;border:1px solid #242836;background:transparent;color:#636b82;font-family:monospace;font-size:10px;cursor:pointer;}
.filter-btn.on{border-color:#4f8fff;background:rgba(79,143,255,0.13);color:#4f8fff;}
@keyframes spin{to{transform:rotate(360deg);}}
.spin{animation:spin 1s linear infinite;display:inline-block;}
#refresh-toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#181c26;border:1px solid #4f8fff44;border-radius:12px;padding:12px 16px;min-width:260px;z-index:200;font-family:monospace;display:none;}

      const log = window._log ? window._log.join('\n') : 'no log';
      navigator.clipboard.writeText(log).then(()=>{
        this.textContent='✓ Copied';
        setTimeout(()=>{ this.textContent='Copy Log'; },2000);
      }).catch(()=>{
        const ta = document.createElement('textarea');
        ta.value = log; ta.style.position='fixed'; ta.style.top='0'; ta.style.opacity='0';
        document.body.appendChild(ta); ta.select(); document.execCommand('copy');
        document.body.removeChild(ta);
        this.textContent='✓ Copied';
        setTimeout(()=>{ this.textContent='Copy Log'; },2000);
      });
    " style="background:#242836;border:none;color:#e8eaf0;border-radius:6px;padding:4px 10px;font-size:10px;font-family:monospace;cursor:pointer;">Copy Log</button>

function h(tag, attrs, ...kids) {
  // Guard: if attrs is not a plain object, it may be a Node passed in wrong position
  if (attrs != null && (attrs instanceof Node || typeof attrs !== 'object' || Array.isArray(attrs))) {
    // attrs is actually a child — shift args
    kids = [attrs, ...kids];
    attrs = {};
  }
  const el = document.createElement(tag);
  for (const [k, v] of Object.entries(attrs || {})) {
    if (k === 'cls') el.className = v;
    else if (k === 'style' && typeof v === 'object') Object.assign(el.style, v);
    else if (k !== 'cls') el[k] = v;
  }
  for (const k of kids.flat(Infinity)) {
    if (k == null || k === false || k === true || k === undefined) continue;
    if (typeof k === 'string') { el.appendChild(document.createTextNode(k)); }
    else if (typeof k === 'number') { el.appendChild(document.createTextNode(String(k))); }
    else if (k instanceof Node) { el.appendChild(k); }
    else { console.warn('h() skipping non-Node child in <'+tag+'>:', typeof k, k); }
  }
  return el;
}
const d = (cls, ...kids) => h('div', {cls}, ...kids);

  // priceToFCF        : from stable/ratios-ttm → priceToFreeCashFlowRatioTTM
  // pegRatio          : from stable/ratios-ttm → priceToEarningsGrowthRatioTTM
  // evToEbitda        : from stable/ratios-ttm → enterpriseValueMultipleTTM
  // pb + roe          : pb from ratios-ttm → priceToBookRatioTTM
  //                     roe from stable/key-metrics → returnOnEquity (decimal, e.g. 1.52 = 152%)
  const fundRaw = {
    revenueGrowth: q.revenueGrowthYoY,
    earningsSurprise: q.earningsSurprise,
    priceToFCF: q.priceToFCF,
    pegRatio: q.pegRatio,
    evToEbitda: q.evToEbitda,
    pb: q.pb,
    roe: q.roe,  // stored as decimal from key-metrics (e.g. 1.52 = 152%)
  };
  const fund = {
    revenueGrowth: fundRaw.revenueGrowth != null && fundRaw.revenueGrowth > 15,
    earningsBeat:  fundRaw.earningsSurprise != null && fundRaw.earningsSurprise > 0,
    pfcf:          fundRaw.priceToFCF != null && fundRaw.priceToFCF < 25,
    peg:           fundRaw.pegRatio != null && fundRaw.pegRatio > 0 && fundRaw.pegRatio < 1.5,
    evEbitda:      fundRaw.evToEbitda != null && fundRaw.evToEbitda > 0 && fundRaw.evToEbitda < 15,
    // ROE from key-metrics is decimal (1.52 = 152%). Convert: > 0.15 means > 15%
    pbRoe:         fundRaw.pb != null && fundRaw.roe != null && fundRaw.pb < 3 && fundRaw.roe > 0.15,
  };
  const fundHit  = Object.values(fund).filter(Boolean).length;
  const fundData = Object.values(fundRaw).filter(v => v != null).length > 0;
  const fundScore = (fundHit / 6) * fw;

  // ── THEMATIC (2 signals, auto via ETF 1M vs SPY 1M) ─────────
  // sectorEtfUp : sector ETF 1M return > SPY 1M return → sector in uptrend
  // themeRS     : sector ETF 1M return > SPY 1M + 1% → theme outperforming
  const etfKey   = SECTOR_ETF[stock.sector];
  const etf1M    = (etfKey && ETF_1M[etfKey] != null) ? ETF_1M[etfKey] : null;
  const spy1M    = SPY_1M;
  const theme = {
    sectorEtfUp: etf1M != null && spy1M != null && etf1M > spy1M,
    themeRS:     etf1M != null && spy1M != null && etf1M > (spy1M + 1),
  };
  const themeScore = (Object.values(theme).filter(Boolean).length / 2) * tw;

  // ── TECHNICAL (5 signals) ────────────────────────────────────
  // above50   : price > 50-day MA  (from stable/quote → priceAvg50)
  // above200  : price > 200-day MA (from stable/quote → priceAvg200)
  // pullback  : price > 50MA but within 4% above it (ideal entry zone)
  // volume    : today's volume > average volume (volumeRatio > 1.0)
  // rs        : stock 1M % change > SPY 1M % change (from stable/stock-price-change)
  const tech = {
    above50:  q.price != null && q.ma50  != null && q.price > q.ma50,
    above200: q.price != null && q.ma200 != null && q.price > q.ma200,
    pullback: q.price != null && q.ma50  != null && q.price > q.ma50 && q.price < q.ma50 * 1.04,
    volume:   q.volumeRatio != null && q.volumeRatio > 1.0,
    rs:       q.stock1M != null && spy1M != null && q.stock1M > spy1M,
  };
  const techScore = (Object.values(tech).filter(Boolean).length / 5) * tw2;

  const total = Math.round(fundScore + themeScore + techScore);
  const stage = total >= 85 ? 'STRONG BUY' : total >= 70 ? 'ENTRY READY' : total >= 50 ? 'SCREENED' : 'WATCHING';

  // Human-readable reason
  const reasons = [];
  if (tech.pullback)          reasons.push('pulling back to 50MA — entry zone');
  if (tech.rs)                reasons.push('outperforming S&P 1M');
  if (theme.themeRS)          reasons.push('sector beating market');
  if (fund.earningsBeat)      reasons.push('earnings growing YoY');
  if (fund.revenueGrowth)     reasons.push('revenue +' + (fundRaw.revenueGrowth ? fundRaw.revenueGrowth.toFixed(0) : '?') + '% YoY');
  if (!tech.above50)          reasons.push('below 50-day MA');
  if (!tech.above200)         reasons.push('below 200-day MA');
  if (!fundData)              reasons.push('fundamentals not loaded');

  // Sanity: log if score jumped > 30 pts from prior
  if (stock.score != null && Math.abs(total - stock.score) > 30) {
    addLog('[SANITY] ' + stock.ticker + ' score jumped ' + stock.score + '→' + total + ' — verify data');
  }

  return {
    total,
    breakdown: {fund: Math.round(fundScore), theme: Math.round(themeScore), tech: Math.round(techScore)},
    signals: {...fund, ...theme, ...tech},
    fundRaw,
    stage,
    reason: reasons.slice(0, 2).join(', ') || 'monitoring',
  };
}

function stageColor(s) {
  return {'STRONG BUY':'#00e5a0','ENTRY READY':'#4f8fff','SCREENED':'#ffc84a','WATCHING':'#636b82','ACTIVE':'#a78bfa'}[s] || '#636b82';
}
function scoreColor(n) {
  return n >= 85 ? '#00e5a0' : n >= 70 ? '#4f8fff' : n >= 50 ? '#ffc84a' : '#636b82';
}

// DATA FETCH — FMP Starter plan
// ═══════════════════════════════════════════════════════
// Endpoint map (all confirmed working):
//
// TECHNICAL:
//   stable/quote?symbol=              → price, priceAvg50, priceAvg200, volume, avgVolume
//   stable/stock-price-change?symbol= → 1M % change (RS vs SPY)
//
// FUNDAMENTAL:
//   stable/ratios-ttm?symbol=         → PEG, P/B, P/FCF, EV/EBITDA
//   stable/key-metrics?symbol=        → returnOnEquity (ROE, decimal)
//   stable/income-statement?symbol=&limit=2 → revenue + netIncome YoY
//
// THEMATIC:
//   stable/stock-price-change?symbol=SPY   → 1M % (once per Refresh All)
//   stable/stock-price-change?symbol={ETF} → 1M % per sector (once per Refresh All)

window._log = [];
function addLog(msg) {
  var ts = new Date().toTimeString().slice(0,8);
  window._log.push(ts + ' ' + msg);
}

var FMP_KEY  = localStorage.getItem('fmp_key') || '';
var FMP_BASE = 'https://financialmodelingprep.com';

// ── Safe fetch with timeout ──────────────────────────────────────────────────
async function safeFetch(url, timeoutMs) {
  timeoutMs = timeoutMs || 15000;
  var controller = new AbortController();
  var timer = setTimeout(function(c){ return function(){ c.abort(); }; }(controller), timeoutMs);
  try {
    var res = await fetch(url, { signal: controller.signal });
    clearTimeout(timer);
    if (!res.ok) { addLog('HTTP ' + res.status + ' ' + url.split('?')[0].split('/').pop()); return null; }
    var json = await res.json();
    // Sanity: warn if response is empty array
    if (Array.isArray(json) && json.length === 0) { addLog('[WARN] empty array response'); return null; }
    return json;
  } catch(e) {
    clearTimeout(timer);
    addLog(e.name === 'AbortError' ? 'timeout' : 'err: ' + e.message.slice(0,60));
    return null;
  }
}

function sleep(ms) { return new Promise(function(r){ setTimeout(r, ms); }); }

// ── Fetch SPY and all sector ETF 1M returns — called once before ticker loop ─
async function prefetchMarketData() {
  addLog('--- prefetch SPY + ETFs ---');
  var symbols = ['SPY', 'QQQ', 'SOXX', 'XLF', 'XLE', 'ITA', 'XLV', 'XLY', 'XLI', 'XLRE', 'XME'];
  for (var i = 0; i < symbols.length; i++) {
    var sym = symbols[i];
    var url = FMP_BASE + '/stable/stock-price-change?symbol=' + sym + '&apikey=' + FMP_KEY;
    var data = await safeFetch(url, 12000);
    var row  = data && (Array.isArray(data) ? data[0] : data);
    if (row && row['1M'] != null) {
      var val = parseFloat(row['1M']);
      if (sym === 'SPY') {
        SPY_1M = val;
        addLog('SPY 1M=' + val.toFixed(2) + '%');
      } else {
        ETF_1M[sym] = val;
        addLog(sym + ' 1M=' + val.toFixed(2) + '%');
      }
    } else {
      addLog('[WARN] ' + sym + ' price-change missing');
    }
    if (i < symbols.length - 1) await sleep(300);
  }
  addLog('--- prefetch done ---');
}

// ── Per-ticker fetch — 5 calls ───────────────────────────────────────────────
async function fetchQuote(ticker) {
  addLog('=== ' + ticker + ' ===');

  if (!FMP_KEY) {
    addLog('No API key — tap ⚙ Key in Pipeline');
    return null;
  }

  // ── Call 1: quote → price, MA50, MA200, volume ───────────────────────────
  addLog('quote...');
  var qdata = await safeFetch(FMP_BASE + '/stable/quote?symbol=' + ticker + '&apikey=' + FMP_KEY, 15000);
  var q = qdata && (Array.isArray(qdata) ? qdata[0] : qdata);
  if (!q || !q.price) { addLog('quote failed'); return null; }

  var price       = parseFloat(q.price);
  var ma50        = parseFloat(q.priceAvg50)  || null;
  var ma200       = parseFloat(q.priceAvg200) || null;
  var vol         = parseFloat(q.volume)      || null;
  var avgVol      = parseFloat(q.avgVolume)   || null;
  var volumeRatio = (avgVol && vol) ? vol / avgVol : null;

  // Sanity checks on price vs MAs
  if (ma50  && (price / ma50  > 3 || price / ma50  < 0.3)) addLog('[SANITY] price/50MA ratio suspect: ' + (price/ma50).toFixed(2));
  if (ma200 && (price / ma200 > 3 || price / ma200 < 0.3)) addLog('[SANITY] price/200MA ratio suspect: ' + (price/ma200).toFixed(2));

  addLog('$' + price.toFixed(2) + (ma50 ? ' 50MA=' + ma50.toFixed(0) : '') + (ma200 ? ' 200MA=' + ma200.toFixed(0) : '') + (volumeRatio ? ' volR=' + volumeRatio.toFixed(2) : ''));

  // ── Call 2: stock-price-change → 1M RS vs SPY ───────────────────────────
  addLog('price-change...');
  var pcdata = await safeFetch(FMP_BASE + '/stable/stock-price-change?symbol=' + ticker + '&apikey=' + FMP_KEY, 12000);
  var pc = pcdata && (Array.isArray(pcdata) ? pcdata[0] : pcdata);
  var stock1M = (pc && pc['1M'] != null) ? parseFloat(pc['1M']) : null;
  if (stock1M != null) {
    addLog('1M=' + stock1M.toFixed(2) + '% vs SPY=' + (SPY_1M != null ? SPY_1M.toFixed(2) + '%' : 'n/a') + (SPY_1M != null ? (stock1M > SPY_1M ? ' ✓RS' : ' ✗RS') : ''));
  } else {
    addLog('[WARN] price-change 1M missing');
  }

  // ── Call 3: ratios-ttm → PEG, P/B, P/FCF, EV/EBITDA ────────────────────
  addLog('ratios-ttm...');
  var rdata = await safeFetch(FMP_BASE + '/stable/ratios-ttm?symbol=' + ticker + '&apikey=' + FMP_KEY, 15000);
  var r = (rdata && Array.isArray(rdata) && rdata[0]) || {};

  var pegRatio   = (r.priceToEarningsGrowthRatioTTM   != null) ? parseFloat(r.priceToEarningsGrowthRatioTTM)   : null;
  var pb         = (r.priceToBookRatioTTM              != null) ? parseFloat(r.priceToBookRatioTTM)              : null;
  var priceToFCF = (r.priceToFreeCashFlowRatioTTM     != null) ? parseFloat(r.priceToFreeCashFlowRatioTTM)     : null;
  var evToEbitda = (r.enterpriseValueMultipleTTM       != null) ? parseFloat(r.enterpriseValueMultipleTTM)       : null;

  // Sanity: negative PEG or P/B is suspect (can happen with negative earnings)
  if (pegRatio   != null && pegRatio   < 0) { addLog('[WARN] negative PEG=' + pegRatio.toFixed(2) + ' (negative earnings?) — treating as null'); pegRatio = null; }
  if (pb         != null && pb         < 0) { addLog('[WARN] negative P/B=' + pb.toFixed(2) + ' — treating as null'); pb = null; }
  if (evToEbitda != null && evToEbitda < 0) { addLog('[WARN] negative EV/EBITDA=' + evToEbitda.toFixed(2) + ' — treating as null'); evToEbitda = null; }

  if (pegRatio || pb || priceToFCF || evToEbitda) {
    addLog('ratios ✓ PEG=' + (pegRatio != null ? pegRatio.toFixed(2) : 'n/a') +
      ' PB=' + (pb != null ? pb.toFixed(1) : 'n/a') +
      ' P/FCF=' + (priceToFCF != null ? priceToFCF.toFixed(1) : 'n/a') +
      ' EV/E=' + (evToEbitda != null ? evToEbitda.toFixed(1) : 'n/a'));
  } else {
    addLog('[WARN] ratios-ttm: all fields missing');
  }

  // ── Call 4: key-metrics → ROE (decimal, e.g. 1.52 = 152%) ──────────────
  addLog('key-metrics...');
  var kmdata = await safeFetch(FMP_BASE + '/stable/key-metrics?symbol=' + ticker + '&apikey=' + FMP_KEY, 15000);
  var km = (kmdata && Array.isArray(kmdata) && kmdata[0]) || {};

  var roe = (km.returnOnEquity != null) ? parseFloat(km.returnOnEquity) : null;
  // Sanity: ROE > 20 (2000%) is likely a data error
  if (roe != null && Math.abs(roe) > 20) { addLog('[WARN] ROE=' + roe.toFixed(2) + ' seems extreme — treating as null'); roe = null; }

  if (roe != null) {
    addLog('key-metrics ✓ ROE=' + (roe * 100).toFixed(1) + '%');
  } else {
    addLog('[WARN] key-metrics: ROE missing');
  }

  // ── Call 5: income-statement → revenue + netIncome YoY ──────────────────
  addLog('income...');
  var idata = await safeFetch(FMP_BASE + '/stable/income-statement?symbol=' + ticker + '&limit=2&apikey=' + FMP_KEY, 15000);

  var revenueGrowthYoY = null, earningsSurprise = null;
  if (idata && Array.isArray(idata) && idata.length >= 2) {
    var cur = idata[0], prev = idata[1];
    if (cur.revenue && prev.revenue && prev.revenue !== 0) {
      revenueGrowthYoY = (cur.revenue - prev.revenue) / Math.abs(prev.revenue) * 100;
      // Sanity: >500% or < -100% is suspect
      if (Math.abs(revenueGrowthYoY) > 500) { addLog('[WARN] rev growth ' + revenueGrowthYoY.toFixed(0) + '% seems extreme'); revenueGrowthYoY = null; }
    }
    if (cur.netIncome != null && prev.netIncome != null && prev.netIncome !== 0) {
      earningsSurprise = (cur.netIncome - prev.netIncome) / Math.abs(prev.netIncome);
    }
    if (revenueGrowthYoY != null || earningsSurprise != null) {
      addLog('income ✓ rev=' + (revenueGrowthYoY != null ? revenueGrowthYoY.toFixed(1) + '%' : 'n/a') +
        ' earn=' + (earningsSurprise != null ? (earningsSurprise * 100).toFixed(1) + '%' : 'n/a'));
    } else {
      addLog('[WARN] income: could not compute YoY');
    }
  } else {
    addLog('[WARN] income: need 2 periods, got ' + (idata && Array.isArray(idata) ? idata.length : 0));
  }

  return {
    price, ma50, ma200, volumeRatio, stock1M,
    pegRatio, pb, priceToFCF, evToEbitda, roe,
    revenueGrowthYoY, earningsSurprise,
    fetchedAt: Date.now()
  };
}


async function refreshSingle(ticker) {
  const idx = S.universe.findIndex(u => u.ticker === ticker);
  if (idx < 0) return;
  window._log = [];
  addLog('Single refresh: ' + ticker);

  // Show mini status in the card
  const statusEl = document.getElementById('uni-status-' + ticker);
  if (statusEl) { statusEl.textContent = '⟳ fetching...'; statusEl.style.color = '#4f8fff'; }

  // Fetch SPY/ETF data if not already loaded (e.g. single refresh without prior Refresh All)
  if (SPY_1M === null && FMP_KEY) {
    addLog('prefetch SPY+ETFs for single refresh...');
    await prefetchMarketData();
  }
  const q = await fetchQuote(ticker);
  S.universe[idx].quoteData = q;
  S.universe[idx].lastUpdated = Date.now();
  if (q) {
    const scored = scoreStock(S.universe[idx]);
    S.universe[idx].score     = scored.total;
    S.universe[idx].breakdown = scored.breakdown;
    S.universe[idx].signals   = scored.signals;
    S.universe[idx].reason    = scored.reason;
    if (S.universe[idx].stage !== 'ACTIVE') S.universe[idx].stage = scored.stage;
  }
  saveState();
  render();
}

async function refreshUniverse() {
  if (REFRESHING) return;
  REFRESHING = true;
  window._log = [];
  SPY_1M = null;
  ETF_1M = {};

  const toast = document.getElementById('refresh-toast');
  const toastTicker = document.getElementById('toast-ticker');
  const toastBar = document.getElementById('toast-bar');
  const toastCounts = document.getElementById('toast-counts');
  const toastLog = document.getElementById('toast-log');
  if (toast) toast.style.display = 'block';

  // Step 0: prefetch SPY + sector ETFs for thematic + RS scoring
  if (toastTicker) { toastTicker.textContent = '⟳ Fetching market data...'; toastTicker.style.color = '#ffc84a'; }
  if (!FMP_KEY) { addLog('No API key — tap ⚙ Key in Pipeline'); }
  else { await prefetchMarketData(); }

  const tickers = S.universe.map(u => u.ticker);
  let fullScored = 0, partialScored = 0, failedCount = 0;

  for (let i = 0; i < tickers.length; i++) {
    const ticker = tickers[i];
    if (toastTicker) toastTicker.style.color = '#4f8fff';
    if (toastBar)    toastBar.style.width = (i / tickers.length * 100) + '%';
    const remaining = (tickers.length - i) * 15;
    const mins = Math.floor(remaining / 60), secs = remaining % 60;
    if (toastCounts) toastCounts.textContent = (i + 1) + ' / ' + tickers.length +
      ' · ~' + (mins > 0 ? mins + 'm ' : '') + secs + 's remaining';

    if (toastTicker) { toastTicker.textContent = '⟳ ' + ticker; toastTicker.style.color = '#4f8fff'; }

    const q = await fetchQuote(ticker);
    const idx = S.universe.findIndex(u => u.ticker === ticker);
    if (idx >= 0) {
      S.universe[idx].quoteData = q;
      S.universe[idx].lastUpdated = Date.now();
      if (q) {
        const scored = scoreStock(S.universe[idx]);
        S.universe[idx].score     = scored.total;
        S.universe[idx].breakdown = scored.breakdown;
        S.universe[idx].signals   = scored.signals;
        S.universe[idx].reason    = scored.reason;
        if (S.universe[idx].stage !== 'ACTIVE') S.universe[idx].stage = scored.stage;
        // Track completeness: full = all 3 categories have data
        const hasF = q.revenueGrowthYoY != null || q.pegRatio != null;
        const hasT = q.stock1M != null;
        const hasTech = q.ma50 != null;
        if (hasF && hasT && hasTech) fullScored++;
        else if (hasTech) partialScored++;
        else failedCount++;
      } else {
        failedCount++;
      }
    }
    saveState();

    if (toastTicker) { toastTicker.textContent = (q ? '✓ ' : '✗ ') + ticker; toastTicker.style.color = q ? '#00e5a0' : '#ff4d6d'; }
    if (toastLog) {
      const recent = window._log.filter(l => l.includes('=== ' + ticker) || (!l.includes('===')));
      toastLog.innerHTML = window._log.slice(-10).map(l => {
        const c = l.includes('ok') ? '#00e5a070' : l.includes('err') || l.includes('FAIL') || l.includes('timeout') ? '#ff4d6d90' : '#636b82';
        return '<div style="color:' + c + '">' + l + '</div>';
      }).join('');
      toastLog.scrollTop = toastLog.scrollHeight;
    }
    // Rate limit guard: pause 60s every 10 tickers with visible countdown
    if (i < tickers.length - 1) {
      const isRatePause = (i + 1) % 10 === 0;
      if (isRatePause) {
        const pauseSecs = 60;
        for (let s = pauseSecs; s > 0; s--) {
          if (toastTicker) { toastTicker.textContent = '⏸ Rate limit pause — resuming in ' + s + 's'; toastTicker.style.color = '#ffc84a'; }
          if (toastCounts) toastCounts.textContent = (i + 1) + ' / ' + tickers.length + ' done · pausing to avoid rate limit';
          await sleep(1000);
        }
        if (toastTicker) { toastTicker.textContent = '▶ Resuming...'; toastTicker.style.color = '#4f8fff'; }
      } else {
        await sleep(300);
      }
    }
  }

  S.lastRefresh = Date.now();
  saveState();
  REFRESHING = false;
  if (toastBar) toastBar.style.width = '100%';

  if (toastCounts) {
    if (failedCount === tickers.length) {
      toastCounts.textContent = 'All fetches failed — check API key';
      toastCounts.style.color = '#ff4d6d';
      const hint = document.getElementById('toast-hint');
      if (hint) hint.style.display = 'block';
    } else {
      toastCounts.textContent = fullScored + ' fully scored · ' + partialScored + ' partial · ' + failedCount + ' failed';
      toastCounts.style.color = fullScored > 0 ? '#00e5a0' : '#ffc84a';
    }
  }
  addLog('--- SUMMARY: ' + fullScored + ' full, ' + partialScored + ' partial, ' + failedCount + ' failed ---');

  render();
  setTimeout(() => { if (toast) toast.style.display = 'none'; }, failed === tickers.length ? 6000 : 2500);
}

// ═══════════════════════════════════════════════════════
// BRIEFING
// ═══════════════════════════════════════════════════════
function generateBriefing() {
  const alerts = [], actions = [];
  if (S.marketPulse === 'red')    alerts.push({level:'red',  msg:'Market in downtrend — S&P below 50-day MA. No new entries. Trim positions to half.'});
  else if (S.marketPulse === 'yellow') alerts.push({level:'warn', msg:'Market choppy — caution. Hold positions, avoid new entries.'});

  S.positions.forEach(p => {
    const avg = getAvgCost(p), cur = getCur(p);
    const plp = (cur - avg) / avg * 100;
    const days = daysSince(p.lots[0]?.date);
    if (p.stop) {
      const d = (cur - p.stop) / cur * 100;
      if (d <= 2)  alerts.push({level:'red',  ticker:p.ticker, msg:p.ticker + ' within 2% of stop (' + fmt(p.stop) + '). Review now.'});
      else if (d <= 5) alerts.push({level:'warn', ticker:p.ticker, msg:p.ticker + ' approaching stop — ' + d.toFixed(1) + '% away.'});
    }
    if (p.target && (p.target - cur) / cur * 100 <= 5) actions.push({level:'pos', ticker:p.ticker, msg:p.ticker + ' within 5% of target. Consider trimming 50%.'});
    if (plp >= 20)  actions.push({level:'pos',  ticker:p.ticker, msg:p.ticker + ' up ' + plp.toFixed(1) + '% — move stop to breakeven.'});
    if (days >= 42 && Math.abs(plp) < 5) actions.push({level:'warn', ticker:p.ticker, msg:p.ticker + ' held ' + days + 'd with <5% move. Dead money — consider exiting.'});
    if (plp <= -6)  alerts.push({level:'red',  ticker:p.ticker, msg:p.ticker + ' down ' + Math.abs(plp).toFixed(1) + '% — near stop threshold.'});
  });

  S.universe
    .filter(u => (u.stage === 'ENTRY READY' || u.stage === 'STRONG BUY') && !S.positions.find(p => p.ticker === u.ticker))
    .forEach(u => actions.push({level: u.stage === 'STRONG BUY' ? 'pos' : 'info', ticker:u.ticker, tag:u.stage,
      msg: u.ticker + ' (' + u.theme + ') — score ' + u.score + '/100. ' + (u.reason || '') + '. Consider entering.'}));

  if (!alerts.length && !actions.length) actions.push({level:'pos', msg:'All clear. Hold positions and monitor.'});
  return {alerts, actions};
}

// ACTIONS ENGINE
// ═══════════════════════════════════════════════════════
function generateActions() {
  const urgent = [], watch = [], opportunity = [];

  // ── URGENT: active positions needing immediate attention ──────────────────
  S.positions.forEach(p => {
    const cur  = getCur(p);
    const avg  = getAvgCost(p);
    const days = daysSince(p.lots[0]?.date);
    const plp  = (cur - avg) / avg * 100;

    if (p.stop && cur <= p.stop) {
      urgent.push({type:'STOP_HIT', ticker:p.ticker, color:'#ff4d6d', icon:'⛔',
        msg:'Stop triggered at ' + fmt(p.stop) + ' — exit now',
        action:'sell', position:p});
    } else if (p.stop) {
      const dist = (cur - p.stop) / cur * 100;
      if (dist <= 2) urgent.push({type:'NEAR_STOP', ticker:p.ticker, color:'#ff4d6d', icon:'⚠',
        msg:'Within ' + dist.toFixed(1) + '% of stop (' + fmt(p.stop) + ') — review now',
        action:'sell', position:p});
    }
    if (p.target && cur >= p.target) {
      urgent.push({type:'TARGET_HIT', ticker:p.ticker, color:'#00e5a0', icon:'🎯',
        msg:'Target ' + fmt(p.target) + ' reached — take profit',
        action:'sell', position:p});
    }
    if (days >= 42 && Math.abs(plp) < 5) {
      urgent.push({type:'DEAD_MONEY', ticker:p.ticker, color:'#ffc84a', icon:'⏱',
        msg:'Held ' + days + ' days with only ' + plp.toFixed(1) + '% move — dead money',
        action:'sell', position:p});
    }
  });

  // ── WATCH: positions and setups to monitor ────────────────────────────────
  S.positions.forEach(p => {
    const cur  = getCur(p);
    const avg  = getAvgCost(p);
    const plp  = (cur - avg) / avg * 100;

    if (p.stop && cur > avg && plp >= 20) {
      watch.push({type:'MOVE_STOP', ticker:p.ticker, color:'#4f8fff', icon:'↑',
        msg:'Up ' + plp.toFixed(1) + '% — move stop to breakeven (' + fmt(avg) + ')',
        action:null});
    }
    if (p.target) {
      const toTarget = (p.target - cur) / cur * 100;
      if (toTarget > 0 && toTarget <= 5) {
        watch.push({type:'NEAR_TARGET', ticker:p.ticker, color:'#00e5a0', icon:'🎯',
          msg:'Within ' + toTarget.toFixed(1) + '% of target — consider trimming 50%',
          action:'sell', position:p});
      }
    }
  });

  // Market pulse warning
  if (S.marketPulse === 'red') {
    watch.push({type:'MARKET', ticker:null, color:'#ff4d6d', icon:'📉',
      msg:'Market in downtrend — no new entries. Protect open positions.',
      action:null});
  } else if (S.marketPulse === 'yellow') {
    watch.push({type:'MARKET', ticker:null, color:'#ffc84a', icon:'◆',
      msg:'Market choppy — reduce sizing on new entries.',
      action:null});
  }

  // Sector momentum — both thematic signals firing
  const sectorsSeen = {};
  S.universe.forEach(u => {
    if (sectorsSeen[u.sector]) return;
    const etfKey = SECTOR_ETF[u.sector];
    const etf1M  = etfKey && ETF_1M[etfKey] != null ? ETF_1M[etfKey] : null;
    if (etf1M != null && SPY_1M != null && etf1M > (SPY_1M + 1)) {
      sectorsSeen[u.sector] = true;
      watch.push({type:'SECTOR_MOMENTUM', ticker:null, color:'#00e5a0', icon:'🚀',
        msg:u.theme + ' outperforming — both thematic signals firing (ETF 1M: ' + etf1M.toFixed(1) + '% vs SPY: ' + SPY_1M.toFixed(1) + '%)',
        action:null});
    }
  });

  // ── OPPORTUNITY: entry setups ready ──────────────────────────────────────
  const inPortfolio = new Set(S.positions.map(p => p.ticker));
  const strongBuys = S.universe
    .filter(u => u.stage === 'STRONG BUY' && !inPortfolio.has(u.ticker) && u.score != null)
    .sort((a, b) => b.score - a.score);
  const entryReady = S.universe
    .filter(u => u.stage === 'ENTRY READY' && !inPortfolio.has(u.ticker) && u.score != null)
    .sort((a, b) => b.score - a.score);

  strongBuys.forEach(u => {
    opportunity.push({type:'STRONG_BUY', ticker:u.ticker, score:u.score, color:'#00e5a0', icon:'★',
      msg:u.theme + ' — score ' + u.score + '/100. ' + (u.reason || 'Strong setup'),
      action:'buy', stock:u});
  });
  entryReady.forEach(u => {
    opportunity.push({type:'ENTRY_READY', ticker:u.ticker, score:u.score, color:'#4f8fff', icon:'◆',
      msg:u.theme + ' — score ' + u.score + '/100. ' + (u.reason || 'Setup forming'),
      action:'buy', stock:u});
  });

  return {urgent, watch, opportunity};
}

function buildActions() {
  const wrap = d('content');
  const {urgent, watch, opportunity} = generateActions();

  // Last refresh time
  if (S.lastRefresh) {
    const mins = Math.floor((Date.now() - S.lastRefresh) / 60000);
    wrap.appendChild(h('div', {style:{textAlign:'right', fontSize:'9px', color:'#636b82', fontFamily:'monospace', marginBottom:'8px'}},
      'Last refresh: ' + (mins < 1 ? 'just now' : mins + 'm ago')));
  } else {
    wrap.appendChild(h('div', {style:{background:'rgba(255,200,74,0.1)', border:'1px solid rgba(255,200,74,0.3)', borderRadius:'10px', padding:'10px 12px', marginBottom:'12px', fontSize:'11px', color:'#ffc84a', fontFamily:'monospace'}},
      'No data yet — tap ⟳ Refresh All in Pipeline to load scores'));
  }

  const section = (title, color, items) => {
    if (!items.length) return null;
    const sec = h('div', {style:{marginBottom:'20px'}});
    sec.appendChild(h('div', {style:{fontSize:'10px', color:color, fontFamily:'monospace', fontWeight:'700', letterSpacing:'2px', marginBottom:'8px', paddingBottom:'6px', borderBottom:'1px solid #242836'}}, title + ' (' + items.length + ')'));
    items.forEach(item => {
      const card = h('div', {style:{background:'#181c26', border:'1px solid ' + color + '33', borderRadius:'12px', padding:'12px 14px', marginBottom:'8px', display:'flex', gap:'10px', alignItems:'flex-start'}});
      // Left: icon + content
      const left = h('div', {style:{flex:'1', minWidth:'0'}});
      const topRow = h('div', {style:{display:'flex', alignItems:'center', gap:'6px', marginBottom:'4px'}});
      topRow.appendChild(h('span', {style:{fontSize:'13px'}}, item.icon));
      if (item.ticker) topRow.appendChild(h('span', {style:{fontFamily:'monospace', fontWeight:'700', fontSize:'13px', color:'#e8eaf0'}}, item.ticker));
      if (item.score != null) topRow.appendChild(h('span', {style:{fontFamily:'monospace', fontSize:'10px', color:color, background:color+'18', padding:'1px 6px', borderRadius:'4px'}}, item.score + '/100'));
      left.appendChild(topRow);
      left.appendChild(h('div', {style:{fontSize:'11px', color:'#9da3b4', lineHeight:'1.5', fontFamily:'monospace'}}, item.msg));
      card.appendChild(left);
      // Right: action button
      if (item.action === 'buy' && item.stock) {
        const btn = h('button', {cls:'btn btn-xs btn-success', style:{flexShrink:'0', alignSelf:'center'}}, 'Buy');
        btn.onclick = () => { MODAL = 'buy'; MDATA = {ticker: item.stock.ticker}; render(); };
        card.appendChild(btn);
      } else if (item.action === 'sell' && item.position) {
        const btn = h('button', {cls:'btn btn-xs btn-danger', style:{flexShrink:'0', alignSelf:'center'}}, 'Sell');
        btn.onclick = () => { MODAL = 'sell'; MDATA = {position: item.position, isStop: item.type === 'STOP_HIT'}; render(); };
        card.appendChild(btn);
      }
      sec.appendChild(card);
    });
    return sec;
  };

  const urgentSec = section('🔴 URGENT', '#ff4d6d', urgent);
  const watchSec  = section('🟡 WATCH',  '#ffc84a', watch);
  const oppSec    = section('🟢 OPPORTUNITY', '#00e5a0', opportunity);

  if (urgentSec) wrap.appendChild(urgentSec);
  if (watchSec)  wrap.appendChild(watchSec);
  if (oppSec)    wrap.appendChild(oppSec);

  if (!urgent.length && !watch.length && !opportunity.length) {
    wrap.appendChild(d('empty',
      h('div', {cls:'icon'}, '✓'),
      h('div', {cls:'mono', style:{fontSize:'12px', marginBottom:'6px'}}, 'Nothing to action'),
      h('div', {style:{fontSize:'11px', color:'#636b82'}}, 'All positions healthy. No setups ready.')
    ));
  }

  return wrap;
}

// ═══════════════════════════════════════════════════════
// RENDER ENGINE
// ═══════════════════════════════════════════════════════
function render() {
  saveState();
  const app = document.getElementById('app');
  app.innerHTML = '';
  app.appendChild(buildApp());
  bindEvents();
}

function buildApp() {
  const invested = S.positions.reduce((s,p) => s + p.lots.reduce((a,l) => a + l.price * l.shares, 0), 0);
  const mktVal   = S.positions.reduce((s,p) => s + getCur(p) * getShares(p), 0);
  const portVal  = S.cash + mktVal;
  const totalPL  = mktVal - invested;
  const {alerts} = generateBriefing();
  const entryCount = S.universe.filter(u => (u.stage === 'ENTRY READY' || u.stage === 'STRONG BUY') && !S.positions.find(p => p.ticker === u.ticker)).length;
  const pc = {green:'#00e5a0', yellow:'#ffc84a', red:'#ff4d6d'}[S.marketPulse] || '#636b82';
  const pl = {green:'UPTREND', yellow:'CHOPPY', red:'DOWNTREND'}[S.marketPulse] || null;

  const header = d('header',
    d('row',
      h('div', {},
        h('div', {style:{display:'flex', alignItems:'center', gap:'6px', marginBottom:'4px'}},
          h('span', {cls:'mono', style:{fontSize:'9px', color:'#636b82', letterSpacing:'3px'}}, 'SANDBOX'),
          pl ? h('span', {cls:'pulse-tag', style:{background:pc+'22', color:pc}}, 'S&P ' + pl) : null
        ),
        h('div', {style:{fontSize:'30px', fontWeight:'800', letterSpacing:'-1px'}}, fmt(portVal)),
        h('div', {cls:'mono', style:{fontSize:'11px', color:totalPL>=0?'#00e5a0':'#ff4d6d', marginTop:'2px'}},
          (totalPL >= 0 ? '▲ ' : '▼ ') + fmt(Math.abs(totalPL)) + ' total P&L')
      ),
      h('div', {style:{display:'flex', flexDirection:'column', gap:'8px', alignItems:'flex-end'}},
        h('button', {cls:'btn btn-ghost', style:{padding:'10px 14px'}, onclick:()=>{MODAL='pot';MDATA={mode:'add'};render();}},
          h('div', {cls:'label', style:{marginBottom:'2px'}}, 'CASH'),
          h('div', {cls:'mono', style:{color:'#00e5a0', fontSize:'13px'}}, fmt(S.cash))
        ),
        d('', ...buildExportImport())
      )
    ),
    d('stat-grid',
      ...(['POT SIZE', 'INVESTED', 'POSITIONS']).map((k,i) => {
        const v = [fmt(S.pot), fmt(invested), S.positions.length + ' open'][i];
        return d('stat-box', h('div', {cls:'label', style:{marginBottom:'3px'}}, k), h('div', {cls:'mono', style:{fontSize:'12px'}}, v));
      })
    ),
    buildTabs(alerts.length, entryCount)
  );

  const wrap = h('div', {});
  wrap.appendChild(header);
  wrap.appendChild(buildTabContent(portVal));
  if (MODAL) wrap.appendChild(buildModal(portVal));
  return wrap;
}

function buildExportImport() {
  const expBtn = h('button', {cls:'btn btn-ghost btn-sm'}, '⬇');
  expBtn.onclick = doExport;
  const label = h('label', {style:{background:'#242836', borderRadius:'10px', padding:'8px 12px', fontSize:'11px', fontWeight:'600', cursor:'pointer', color:'#e8eaf0', display:'inline-block'}}, '⬆');
  const imp = h('input', {type:'file', accept:'.json', style:{display:'none'}});
  imp.onchange = doImport;
  label.appendChild(imp);
  return [h('div', {style:{display:'flex', gap:'6px'}}, expBtn, label)];
}

const TABS = [
  {id:'actions',   label:'Actions'},
  {id:'brief',     label:'Brief'},
  {id:'pipeline',  label:'Pipeline'},
  {id:'portfolio', label:'Positions'},
  {id:'watchlist', label:'Watch'},
  {id:'model',     label:'Model'},
  {id:'log',       label:'Log'},
  {id:'help',      label:'Help'},
];

function buildTabs(alertCount, entryCount) {
  const actionCount = generateActions().urgent.length;
  return d('tabs', ...TABS.map(t => {
    const b = h('button', {cls:'tab' + (ACTIVE_TAB === t.id ? ' active' : '')}, t.label);
    b.onclick = () => { ACTIVE_TAB = t.id; render(); };
    if (t.id === 'actions'  && actionCount > 0) b.appendChild(h('span', {cls:'badge'}, String(actionCount)));
    if (t.id === 'brief'    && alertCount > 0)  b.appendChild(h('span', {cls:'badge'}, String(alertCount)));
    if (t.id === 'pipeline' && entryCount > 0)  b.appendChild(h('span', {cls:'badge'}, String(entryCount)));
    return b;
  }));
}

function buildTabContent(portVal) {
  if (ACTIVE_TAB === 'actions')   return buildActions();
  if (ACTIVE_TAB === 'brief')     return buildBriefing();
  if (ACTIVE_TAB === 'pipeline')  return buildPipeline();
  if (ACTIVE_TAB === 'portfolio') return buildPortfolio();
  if (ACTIVE_TAB === 'watchlist') return buildWatchlist();
  if (ACTIVE_TAB === 'model')     return buildModel(portVal);
  if (ACTIVE_TAB === 'log')       return buildLog();
  if (ACTIVE_TAB === 'help')      return buildHelp();
  return d('content');
}

// ─── BRIEFING ─────────────────────────────────────────
function buildBriefing() {
  const wrap = d('content');
  const {alerts, actions} = generateBriefing();
  const pc = {green:'#00e5a0', yellow:'#ffc84a', red:'#ff4d6d'}[S.marketPulse] || '#636b82';
  const pi = {green:'▲', yellow:'◆', red:'▼'}[S.marketPulse] || '○';
  const pl = {green:'Uptrend', yellow:'Choppy', red:'Downtrend'}[S.marketPulse] || 'Not Set';

  const pulseBtn = h('button', {cls:'btn btn-ghost btn-sm', style:{display:'flex', alignItems:'center', gap:'6px', background:pc+'18', border:'1px solid ' + pc + '55', color:pc}}, pi + ' S&P ' + pl);
  pulseBtn.onclick = () => { MODAL = 'pulse'; render(); };

  wrap.appendChild(d('row',
    h('div', {}, h('div', {cls:'label'}, 'MORNING BRIEFING'), h('div', {cls:'mono', style:{fontSize:'14px', color:'#e8eaf0', marginTop:'2px'}}, today())),
    pulseBtn
  ));

  const LC = {
    red:  ['#ff4d6d', 'rgba(255,77,109,0.07)',  'rgba(255,77,109,0.27)',  '⚠'],
    warn: ['#ffc84a', 'rgba(255,200,74,0.07)',  'rgba(255,200,74,0.27)',  '△'],
    pos:  ['#00e5a0', 'rgba(0,229,160,0.07)',   'rgba(0,229,160,0.27)',   '✓'],
    info: ['#4f8fff', 'rgba(79,143,255,0.07)',  'rgba(79,143,255,0.27)',  '●'],
  };

  const mkCard = item => {
    const [c, bg, border, icon] = LC[item.level] || LC.info;
    return h('div', {cls:'brief-card', style:{background:bg, border:'1px solid ' + border}},
      h('span', {cls:'brief-icon', style:{color:c}}, icon),
      h('div', {style:{flex:'1'}},
        item.ticker ? h('div', {style:{display:'flex', alignItems:'center', gap:'6px', marginBottom:'2px'}},
          h('span', {cls:'mono', style:{fontSize:'11px', color:c}}, item.ticker),
          item.tag ? h('span', {cls:'stage-tag', style:{background:c+'22', color:c}}, item.tag) : null
        ) : null,
        h('div', {style:{fontSize:'13px', lineHeight:'1.5'}}, item.msg)
      )
    );
  };

  if (alerts.length) {
    wrap.appendChild(h('div', {style:{marginTop:'18px', marginBottom:'12px'}},

// ─── PIPELINE ─────────────────────────────────────────
function buildPipeline() {
  const wrap = d('content');

  const refreshBtn = h('button', {cls:'btn btn-ghost btn-sm', id:'refresh-btn'}, REFRESHING ? h('span', {cls:'spin'}, '⟳') : '⟳ Refresh All');
  refreshBtn.onclick = () => { if (!REFRESHING) refreshUniverse(); };

  const testBtn = h('button', {cls:'btn btn-ghost btn-sm', style:{fontSize:'10px', color:'#ffc84a'}}, '⚡ Test');
  testBtn.onclick = async () => {
    testBtn.textContent = '⟳ ...';
    testBtn.disabled = true;
    window._log = [];

    const toast = document.getElementById('refresh-toast');
    const toastTicker = document.getElementById('toast-ticker');
    const toastLog = document.getElementById('toast-log');
    const toastCounts = document.getElementById('toast-counts');
    if (toast) toast.style.display = 'block';
    if (toastTicker) { toastTicker.textContent = '⟳ Fetching AAPL from Yahoo...'; toastTicker.style.color = '#ffc84a'; }
    if (toastCounts) toastCounts.textContent = 'Testing connection (up to 20s)...';
    if (toastLog) toastLog.innerHTML = '';

    // Live-update log every 500ms while fetching
    const logInterval = setInterval(() => {
      if (toastLog) {
        toastLog.innerHTML = window._log.map(l => {
          const isOk  = l.includes('✓');
          const isBad = l.includes('Error') || l.includes('Timeout') || l.includes('failed') || l.includes('HTTP');
          const c = isOk ? '#00e5a0' : isBad ? '#ff4d6d' : '#9da3b4';
          return '<div style="color:' + c + ';margin-bottom:2px;">' + l + '</div>';
        }).join('');
        toastLog.scrollTop = toastLog.scrollHeight;
      }
    }, 400);

    let q = null;
    try {
      q = await fetchQuote('AAPL');
    } catch(e) {
      addLog('UNCAUGHT: ' + e.message);
    }
    clearInterval(logInterval);

    // Final log render
    if (toastLog) {
      toastLog.innerHTML = window._log.map(l => {
        const isOk  = l.includes('✓');
        const isBad = l.includes('Error') || l.includes('Timeout') || l.includes('failed') || l.includes('HTTP');
        const c = isOk ? '#00e5a0' : isBad ? '#ff4d6d' : '#9da3b4';
        return '<div style="color:' + c + ';margin-bottom:2px;">' + l + '</div>';
      }).join('');
      toastLog.scrollTop = toastLog.scrollHeight;
    }

    if (toastTicker) {
      toastTicker.textContent = q
        ? '✓  AAPL fetched — $' + q.price.toFixed(2)
        : '✗  Fetch failed';
      toastTicker.style.color = q ? '#00e5a0' : '#ff4d6d';
      toastTicker.style.fontWeight = '700';
    }
    if (toastCounts) {
      toastCounts.textContent = q
        ? 'Yahoo is reachable. Tap ⟳ Refresh All to load all scores.'
        : 'Tap "Copy Log" above and share the log text.';
      toastCounts.style.color = q ? '#00e5a0' : '#ffc84a';
    }

    testBtn.textContent = q ? '✓ OK' : '✗ Fail';
    testBtn.style.color = q ? '#00e5a0' : '#ff4d6d';
    testBtn.disabled = false;
    // Don't auto-hide on failure so user can read + copy
    if (q) setTimeout(() => { if (!REFRESHING) { if(toast) toast.style.display='none'; } testBtn.textContent='⚡ Test'; testBtn.style.color='#ffc84a'; }, 6000);
  };

  // Show fetch context warning if we're in an iframe
  const inIframe = (() => { try { return window.self !== window.top; } catch(e) { return true; } })();

      '⬇ Download this file and open it in your browser for live data. Fetch is blocked in preview. Use ✎ Manual Score instead.'

      h('div', {style:{flex:'1', minWidth:'0'}},
        d('row',
          h('div', {},
            h('span', {cls:'mono', style:{fontSize:'14px', fontWeight:'700'}}, u.ticker),

        ),

            (() => { const b = h('button', {cls:'btn btn-xs btn-ghost'}, '✎ Score'); b.onclick = e => { e.stopPropagation(); MODAL='manual-score'; MDATA={stock:u}; render(); }; return b; })()
          ),

function buildPortfolio() {
  const wrap = d('content');

function buildPositionCard(p) {
  const sh = getShares(p), cost = p.lots.reduce((s,l) => s+l.price*l.shares, 0);
  const avg = cost/sh, cur = getCur(p), val = cur*sh, pl = val-cost, plp = pl/cost*100;
  const days = daysSince(p.lots[0]?.date);
  const sc = pl >= 0 ? '#00e5a0' : '#ff4d6d';
  let progress = null;
  if (p.stop && p.target) progress = Math.max(0, Math.min(100, (cur-p.stop)/(p.target-p.stop)*100));

  const header = h('div', {cls:'card-inner', style:{cursor:'pointer'}},
    d('row',
      h('div', {},
        h('div', {cls:'mono', style:{fontSize:'16px', fontWeight:'700'}}, p.ticker),
        h('div', {style:{fontSize:'10px', color:'#636b82', marginTop:'2px'}}, (p.theme||'') + (p.theme?' · ':'') + days + 'd held')
      ),
      h('div', {style:{textAlign:'right'}},
        h('div', {cls:'mono', style:{fontSize:'15px', color:sc}}, fmt(val)),
        h('div', {style:{fontSize:'11px', color:sc, marginTop:'2px'}}, pct(plp) + ' · ' + (pl>=0?'+':'') + fmt(pl))
      )
    ),
    progress != null ? h('div', {},
      d('progress-track', h('div', {cls:'progress-bar', style:{width:progress+'%', background:progress>66?'#00e5a0':progress>33?'#ffc84a':'#ff4d6d'}})),
      d('row',
        h('span', {cls:'mono', style:{fontSize:'9px', color:'#ff4d6d'}}, 'SL ' + fmt(p.stop)),
        h('span', {cls:'mono', style:{fontSize:'9px', color:'#00e5a0'}}, 'TGT ' + fmt(p.target))
      )
    ) : null
  );

  const detail = h('div', {style:{display:'none', padding:'0 16px 14px', borderTop:'1px solid #242836'}},
    h('div', {cls:'col2', style:{paddingTop:'10px', marginBottom:'10px'}},
      ...[['AVG COST',fmt(avg)],['SHARES',sh],['INVESTED',fmt(cost)],['CUR PRICE',fmt(cur)]].map(([k,v]) =>
        h('div', {style:{background:'#0a0c10', borderRadius:'8px', padding:'8px'}},
          h('div', {cls:'label', style:{marginBottom:'2px'}}, k),
          h('div', {cls:'mono', style:{fontSize:'12px'}}, String(v))
        )
      )
    ),
    p.thesis ? h('div', {style:{background:'#0a0c10', borderRadius:'8px', padding:'10px', marginBottom:'10px'}},
      h('div', {cls:'label', style:{marginBottom:'3px'}}, 'THESIS'),
      h('div', {style:{fontSize:'12px', lineHeight:'1.5'}}, p.thesis)
    ) : null,
    h('div', {cls:'col3'}, ...[
      ['📈 Price', () => { MODAL='price'; MDATA={position:p}; render(); }],
      ['＋ Add',   () => { MODAL='buy';   MDATA={ticker:p.ticker}; render(); }],
      ['Sell',     () => { MODAL='sell';  MDATA={position:p, isStop:false}; render(); }],
    ].map(([lbl, fn]) => {
      const b = h('button', {cls:'btn btn-ghost btn-sm'}, lbl);
      b.onclick = fn;
      return b;
    }))
  );

  header.onclick = () => { detail.style.display = detail.style.display === 'none' ? 'block' : 'none'; };

  const card = d('card', header, detail);
  card.style.borderLeft = '3px solid ' + sc;
  return card;
}
